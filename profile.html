<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Artist Profile — ROSTR+ GCC</title>
  <meta name="description" content="View detailed artist profile, bookings, and rates on ROSTR+ GCC">

  <!-- Open Graph (updated dynamically once artist loads) -->
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="ROSTR+ GCC">
  <meta property="og:title" content="Artist Profile — ROSTR+ GCC">
  <meta property="og:description" content="View detailed artist profile, bookings, and rates.">
  <meta property="og:image" content="https://rosterplus.io/icons/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://rosterplus.io/profile.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Artist Profile — ROSTR+ GCC">
  <meta name="twitter:description" content="View detailed artist profile, bookings, and rates.">
  <meta name="twitter:image" content="https://rosterplus.io/icons/og-default.png">

  <link rel="canonical" href="https://rosterplus.io/profile.html">
  <script type="application/ld+json" id="artist-ld-json"></script>

  <link rel="stylesheet" href="assets/css/system.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/error-logger.js"></script>
  <script src="assets/js/app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main id="profile-root">
      <div class="dir-empty" style="max-width: 600px; margin: 140px auto">
        <h3 style="margin-bottom: 8px">Loading artist…</h3>
        <p style="color: var(--text-tertiary); font-size: 0.9rem">Hang tight.</p>
      </div>
    </main>
  </div>

  <script>
    /* Deterministic tinted-gradient cover from the artist's name.
       Stand-in for real photos until they upload their own. */
    function coverStyle(name, scale = 1) {
      const hash = (name || '').split('').reduce((h, c) => h + c.charCodeAt(0), 0);
      const hue = hash % 360;
      return `background: radial-gradient(ellipse ${70 * scale}% ${60 * scale}% at 30% 30%, hsla(${hue}, 22%, 45%, 0.6) 0%, transparent 60%),
                          linear-gradient(180deg, var(--bg-3), var(--bg-base));`;
    }

    function initials(name) {
      return (name || '?').split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    function getArtistIdFromURL() {
      return new URLSearchParams(window.location.search).get('id');
    }

    async function findArtist(id) {
      const result = await DB.getArtistById(id);
      return (result.success && result.data) ? result.data : null;
    }

    async function getSimilarArtists(artist) {
      const result = await DB.getArtists({ genre: artist.genre });
      if (!result.success) return [];
      return (result.data || []).filter(a => a.id !== artist.id).slice(0, 4);
    }

    /* 21-day availability strip built from the artist's real data.
       We render three states per cell:
         - 'today'     today's date (just a ring, no fill)
         - 'booked'    in artist.blocked_dates
         - 'available' everything else within available_from..available_to
       Falls back to a neutral (empty) cell if the artist hasn't set any
       dates — promoters can still contact to confirm. */
    function buildAvailability(artist) {
      const blocked = Array.isArray(artist.blocked_dates) ? new Set(artist.blocked_dates) : new Set();
      const from = artist.available_from ? new Date(artist.available_from) : null;
      const to   = artist.available_to   ? new Date(artist.available_to)   : null;
      const today = new Date(); today.setHours(0,0,0,0);

      const toIso = (d) => d.toISOString().slice(0, 10);
      const days = [];
      for (let i = 0; i < 21; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const iso = toIso(d);
        let cls = '';
        if (i === 0) cls = 'today';
        else if (blocked.has(iso)) cls = 'booked';
        else if (from && d < from) cls = 'booked';
        else if (to && d > to) cls = 'booked';
        else cls = 'available';
        days.push(cls);
      }
      return days;
    }

    function renderProfile(artist, similar, container) {
      const name       = artist.name || artist.stage_name || 'Artist';
      const genre      = artist.genre || 'Artist';
      const city       = artist.city || '—';
      const avatarUrl  = artist.avatar_url;
      const verified   = artist.verified;
      const bio        = artist.bio || `${name} is a ${String(genre).toLowerCase()} artist based out of ${city}, with a residency history across the GCC's premium venues. Known for long-form sets, curated track selection, and a close relationship with the region's headline promoters.`;
      const avail      = artist.available === false ? 'booked' : 'avail';
      const availLabel = avail === 'avail' ? 'Available' : 'Fully booked';
      const days       = buildAvailability(artist);

      // Social chips (keep what's provided; no fake counts)
      const social = artist.social || {};
      const socialHtml = [];
      if (social.instagram && typeof social.instagram === 'string' && social.instagram.startsWith('http')) {
        socialHtml.push(`<a class="ap-social-chip" href="${esc(social.instagram)}" target="_blank" rel="noopener">${UI.icon('send', 13)} Instagram</a>`);
      }
      if (social.soundcloud && typeof social.soundcloud === 'string' && social.soundcloud.startsWith('http')) {
        socialHtml.push(`<a class="ap-social-chip" href="${esc(social.soundcloud)}" target="_blank" rel="noopener">${UI.icon('music', 13)} SoundCloud</a>`);
      }
      if (social.spotify && typeof social.spotify === 'string' && social.spotify.startsWith('http')) {
        socialHtml.push(`<a class="ap-social-chip" href="${esc(social.spotify)}" target="_blank" rel="noopener">${UI.icon('music', 13)} Spotify</a>`);
      }

      // Tech rider from DB or a reasonable default list
      const riderFromDb = Array.isArray(artist.tech_rider) ? artist.tech_rider : [];
      const rider = riderFromDb.length > 0
        ? riderFromDb.map(r => typeof r === 'string' ? r : (r.item || r.label || JSON.stringify(r)))
        : [
            '2× Pioneer CDJ-3000',
            'Pioneer DJM-V10 mixer',
            'Stereo DI → FOH',
            'House L/R + 1× monitor wedge',
            'Private greenroom + 2 guests',
          ];

      container.innerHTML = `
        <div class="ap-cover" style="${coverStyle(name, 2)}"></div>

        <section class="ap-narrow">
          <div class="ap-header lp-anim">
            <div class="ap-avatar" style="${avatarUrl ? '' : coverStyle(name)}">
              ${avatarUrl ? `<img src="${esc(avatarUrl)}" alt="${esc(name)}">` : esc(initials(name))}
            </div>
            <div class="ap-head-col">
              <div class="ap-meta-line">${esc(genre)} · ${esc(city)}</div>
              <h1 class="ap-name">
                ${esc(name)}
                ${verified ? `<span class="verified" title="Verified">${UI.icon('check', 14)}</span>` : ''}
              </h1>
              <div class="ap-badges">
                <div class="availability-dot ${avail}">
                  ${avail === 'avail' ? '<span class="pulse-dot"></span>' : ''}
                  ${availLabel}
                </div>
                <div id="rating-badge" style="display:none;align-items:center;gap:4px;font-size:0.78rem;color:var(--text-tertiary);font-family:var(--font-mono)"></div>
              </div>
            </div>
            <div class="ap-actions">
              ${UI.shareButton({
                label: 'Share',
                variant: 'ghost',
                size: 'sm',
                // Route shares through the edge function so link-preview
                // bots (WhatsApp, Instagram, Slack, X) get the real
                // artist-specific OG tags. Browsers follow the embedded
                // <meta refresh> straight to /profile.html within ~50ms.
                url: `https://vgjmfpryobsuboukbemr.supabase.co/functions/v1/profile-share?id=${esc(artist.id)}`,
                title: `${name} — ROSTR+ GCC`,
              })}
              <a class="btn btn-secondary" href="messages.html?to=${esc(artist.profile_id || '')}">${UI.icon('inbox', 14)} Message</a>
              <a class="btn btn-primary" href="booking.html?artist=${esc(artist.id)}">${UI.icon('send', 14)} Request booking</a>
            </div>
          </div>

          <div class="ap-grid">
            <div class="ap-col lp-anim lp-d-1">
              <div class="ap-card">
                <div class="eyebrow">About</div>
                <p>${esc(bio)}</p>
                <div class="ap-quickfacts">
                  <div class="ap-quickfact">
                    <div class="eyebrow">Fee</div>
                    <div class="val">On request</div>
                  </div>
                  <div class="ap-quickfact">
                    <div class="eyebrow">Set length</div>
                    <div class="val">2–4 hrs</div>
                  </div>
                  <div class="ap-quickfact">
                    <div class="eyebrow">Response</div>
                    <div class="val">Fast</div>
                  </div>
                </div>
                ${socialHtml.length ? `<div class="ap-socials">${socialHtml.join('')}</div>` : ''}
              </div>
            </div>

            <div class="ap-col lp-anim lp-d-2">
              <div class="ap-card">
                <div class="eyebrow">Next 3 weeks</div>
                <h3>Availability</h3>
                <div class="ap-cal" style="margin-top: 12px">
                  <div class="ap-cal-head">S</div>
                  <div class="ap-cal-head">M</div>
                  <div class="ap-cal-head">T</div>
                  <div class="ap-cal-head">W</div>
                  <div class="ap-cal-head">T</div>
                  <div class="ap-cal-head">F</div>
                  <div class="ap-cal-head">S</div>
                  ${days.map((state, i) => `
                    <div class="ap-cal-cell ${state}">${i + 1}</div>
                  `).join('')}
                </div>
                <div class="ap-cal-legend">
                  <span class="chip"><span class="sw" style="background: var(--accent-dim-20)"></span> Free</span>
                  <span class="chip"><span class="sw" style="background: rgba(243,160,160,0.2)"></span> Booked</span>
                </div>
              </div>

              <div class="ap-card">
                <div class="eyebrow">Tech rider</div>
                <h3>Standard setup</h3>
                <ul class="ap-rider">
                  ${rider.map(r => `<li><span class="check">${UI.icon('check', 14)}</span> ${esc(r)}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>

          <!-- Reviews — populated async by loadReviews() -->
          <div id="reviews-section" style="margin-top:var(--space-2xl);display:none">
            <div class="eyebrow" style="font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary)">Reviews</div>
            <h3 style="font-family: var(--font-display); font-size: 1.3rem; margin-top: 4px; letter-spacing: -0.02em">What promoters say</h3>
            <div id="reviews-list" style="margin-top:var(--space-md);display:flex;flex-direction:column;gap:var(--space-sm)"></div>
          </div>

          ${similar.length > 0 ? `
            <div class="ap-similar">
              <div class="eyebrow" style="font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary)">Similar artists</div>
              <h3 style="font-family: var(--font-display); font-size: 1.3rem; margin-top: 4px; letter-spacing: -0.02em">You might also like</h3>
              <div class="ap-similar-grid">
                ${similar.map(s => {
                  const sName = s.name || s.stage_name || 'Artist';
                  return `
                    <a class="artist-card" href="profile.html?id=${esc(s.id)}" style="aspect-ratio: 3 / 4; display: block">
                      <div class="cover" style="${coverStyle(sName)}"></div>
                      <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 2.4rem; letter-spacing: -0.04em; color: rgba(255,255,255,0.18); z-index: 1">${esc(initials(sName))}</div>
                      <div class="artist-card-content">
                        <div class="artist-card-top">
                          <div class="availability-dot ${s.available === false ? 'booked' : 'avail'}">
                            ${s.available === false ? 'Booked' : 'Free'}
                          </div>
                        </div>
                        <div>
                          ${s.genre ? `<div class="artist-card-genre">${esc(s.genre)}</div>` : ''}
                          <div class="artist-card-name">${esc(sName)}</div>
                          <div class="artist-card-meta">
                            <span style="display:inline-flex;align-items:center;gap:4px">${UI.icon('mapPin', 10)} ${esc(s.city || '—')}</span>
                          </div>
                        </div>
                      </div>
                    </a>
                  `;
                }).join('')}
              </div>
            </div>
          ` : ''}
        </section>
      `;

      if (typeof hydrateIcons === 'function') hydrateIcons(container);
    }

    function renderEmptyState(container) {
      container.innerHTML = `
        <div class="dir-empty" style="max-width: 600px; margin: 140px auto">
          <h3 style="margin-bottom: 8px">Artist not found</h3>
          <p style="color: var(--text-tertiary); font-size: 0.9rem; margin-bottom: 20px">
            This profile doesn't exist or has been removed. Try browsing the directory.
          </p>
          <a href="directory.html" class="btn btn-primary">Back to directory</a>
        </div>
      `;
    }

    function updateMeta(artist) {
      const name = artist.name || artist.stage_name || 'Artist';
      const bio = String(artist.bio || '').trim();
      const desc = bio
        ? (bio.length > 160 ? bio.slice(0, 157) + '\u2026' : bio)
        : ([artist.genre, artist.city].filter(Boolean).join(' \u2014 ') + ' \u00b7 Book on ROSTR+ GCC.').trim();
      const img = artist.avatar_url || 'https://rosterplus.io/icons/og-default.png';
      const url = `https://rosterplus.io/profile.html?id=${encodeURIComponent(artist.id)}`;
      const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
      document.title = `${name} \u2014 ROSTR+ GCC`;
      setMeta('meta[property="og:title"]',        `${name} \u2014 ROSTR+ GCC`);
      setMeta('meta[property="og:description"]',  desc);
      setMeta('meta[property="og:image"]',        img);
      setMeta('meta[property="og:url"]',          url);
      setMeta('meta[name="twitter:title"]',       `${name} \u2014 ROSTR+ GCC`);
      setMeta('meta[name="twitter:description"]', desc);
      setMeta('meta[name="twitter:image"]',       img);
      setMeta('meta[name="description"]',         desc);

      // Canonical — tells search engines the real URL of this page so query
      // params don't create duplicate content.
      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', url);

      // JSON-LD MusicGroup schema — gets picked up by Google for rich
      // results. schema.org/MusicGroup matches both DJs and bands; the
      // image + url fields work identically to og meta.
      const ld = {
        '@context': 'https://schema.org',
        '@type':    'MusicGroup',
        name,
        description: desc,
        image:       img,
        url,
        genre:       Array.isArray(artist.genre) ? artist.genre : (artist.genre ? [artist.genre] : []),
        address: artist.city ? { '@type': 'PostalAddress', addressLocality: artist.city } : undefined,
      };
      const ldEl = document.getElementById('artist-ld-json');
      if (ldEl) ldEl.textContent = JSON.stringify(ld);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof Auth !== 'undefined') await Auth.ready();
      const navRoot = document.getElementById('nav-root');
      if (navRoot && typeof renderNav === 'function') {
        navRoot.innerHTML = renderNav('directory');
      }
      if (typeof hydrateIcons === 'function') hydrateIcons();

      const id = getArtistIdFromURL();
      const root = document.getElementById('profile-root');
      if (!id) { renderEmptyState(root); document.title = 'Artist Not Found — ROSTR+ GCC'; return; }

      const artist = await findArtist(id);
      if (!artist) { renderEmptyState(root); document.title = 'Artist Not Found — ROSTR+ GCC'; return; }

      const similar = await getSimilarArtists(artist);
      renderProfile(artist, similar, root);
      updateMeta(artist);

      // Reviews load async — they're server-aggregated, don't block
      // the critical path. Target is the artist's profile_id (their
      // auth user id); unclaimed artists have no profile_id so we skip.
      if (artist.profile_id) {
        loadReviews(artist.profile_id).catch(() => {});
      }
    });

    /* Load + render the rating badge and reviews list. Non-fatal —
       surfaces zero state quietly if nothing is back from the server. */
    async function loadReviews(userId) {
      try {
        const [statsRes, listRes] = await Promise.all([
          DB.reviewStatsForUser(userId),
          DB.reviewsForUser(userId, 10),
        ]);

        // Rating badge next to the availability pill
        const badge = document.getElementById('rating-badge');
        if (badge && statsRes.success && Number(statsRes.data?.review_count) > 0) {
          const avg = Number(statsRes.data.avg_rating).toFixed(1);
          const count = Number(statsRes.data.review_count);
          badge.innerHTML = `<span style="color:var(--accent-soft)">★</span> ${avg} <span style="color:var(--text-tertiary)">(${count})</span>`;
          badge.style.display = 'inline-flex';
        }

        // Review list
        const section = document.getElementById('reviews-section');
        const list = document.getElementById('reviews-list');
        if (!section || !list) return;
        if (!listRes.success || !listRes.data.length) return;
        section.style.display = '';
        list.innerHTML = listRes.data.map(r => {
          const stars = '★★★★★'.slice(0, r.rating) + '☆☆☆☆☆'.slice(0, 5 - r.rating);
          const when = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
          const eventLine = r.event_name || r.event_date
            ? `<div style="font-size:0.72rem;color:var(--text-tertiary);margin-top:4px">${esc(r.event_name || '')}${r.event_name && r.event_date ? ' · ' : ''}${r.event_date ? new Date(r.event_date + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</div>`
            : '';
          return `
            <div style="padding:var(--space-md);background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm)">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);flex-wrap:wrap">
                <div style="color:var(--accent-soft);font-size:0.95rem;letter-spacing:0.04em">${stars}</div>
                <div style="font-size:0.72rem;color:var(--text-tertiary);font-family:var(--font-mono)">${when}${r.reviewer_name ? ' · ' + esc(r.reviewer_name) : ''}</div>
              </div>
              ${r.comment ? `<p style="margin-top:8px;color:var(--text-secondary);font-size:0.92rem;line-height:1.5">${esc(r.comment)}</p>` : ''}
              ${eventLine}
            </div>
          `;
        }).join('');
      } catch (_) { /* silent — non-critical */ }
    }
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
