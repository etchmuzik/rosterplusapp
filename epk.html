<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>EPK — ROSTR+ GCC</title>
  <meta name="description" content="Electronic press kit — bio, tech rider, past performances, and booking info for a ROSTR+ GCC artist.">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="ROSTR+ GCC">
  <meta property="og:title" content="Artist EPK — ROSTR+ GCC">
  <meta property="og:description" content="Electronic press kit — bio, tech rider, past performances, and booking info.">
  <meta property="og:image" content="https://rosterplus.io/icons/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://rosterplus.io/epk.html">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Artist EPK — ROSTR+ GCC">
  <meta name="twitter:description" content="Electronic press kit — bio, tech rider, past performances, and booking info.">
  <meta name="twitter:image" content="https://rosterplus.io/icons/og-default.png">

  <link rel="canonical" href="https://rosterplus.io/epk.html">
  <script type="application/ld+json" id="epk-ld-json"></script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://vgjmfpryobsuboukbemr.supabase.co" crossorigin>

  <link rel="stylesheet" href="assets/css/system.css?v=2521872">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/error-logger.js?v=2521872" defer></script>
  <script src="assets/js/app.js?v=2521872" defer></script>
  <style>
    .epk-container { max-width: 900px; margin: 80px auto 0; padding: var(--space-2xl) var(--space-lg); }
    .epk-hero { text-align: center; margin-bottom: var(--space-3xl); padding: var(--space-3xl) 0; border-bottom: 1px solid var(--border-subtle); }
    .avatar-xlarge { width: 160px; height: 160px; border-radius: 16px; margin: 0 auto var(--space-xl); background: var(--gold-dim); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 4rem; font-weight: 700; color: var(--gold-text); overflow: hidden; }
    .avatar-xlarge img { width: 100%; height: 100%; object-fit: cover; }
    .epk-name { font-family: var(--font-display); font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: var(--space-sm); }
    .epk-meta { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: var(--space-md); }
    .epk-socials { display: flex; justify-content: center; gap: var(--space-md); margin-top: var(--space-lg); }
    .epk-socials a { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.85rem; text-decoration: none; padding: 6px 12px; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); transition: all var(--duration-fast); }
    .epk-socials a:hover { border-color: var(--gold); color: var(--gold-text); }
    .epk-section { margin-bottom: var(--space-3xl); }
    .epk-section-title { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: var(--space-lg); }
    .quote-grid { display: grid; gap: var(--space-md); }
    .quote-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 6px; }
    .quote-card-inner { background: var(--bg-raised); border-radius: calc(var(--radius-lg) - 4px); padding: var(--space-lg); }
    .quote-text { font-style: italic; color: var(--text-secondary); line-height: 1.7; margin-bottom: var(--space-sm); font-size: 1.05rem; }
    .quote-text::before { content: '\201C'; color: var(--gold-text); font-size: 1.5rem; margin-right: 4px; }
    .quote-source { font-family: var(--font-mono); font-size: 0.78rem; color: var(--gold-text); }
    .perf-list { display: flex; flex-direction: column; gap: var(--space-sm); }
    .perf-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md) var(--space-lg); background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); }
    .perf-venue { font-weight: 600; color: var(--text-primary); flex: 1; }
    .perf-event { color: var(--text-secondary); font-size: 0.88rem; flex: 1; }
    .perf-date { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-tertiary); }
    .rider-list { display: flex; flex-direction: column; gap: var(--space-sm); }
    .rider-item { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) var(--space-md); background: var(--bg-card); border-radius: var(--radius-sm); font-size: 0.88rem; }
    .rider-key { color: var(--text-secondary); font-weight: 500; }
    .rider-value { color: var(--text-tertiary); font-family: var(--font-mono); font-size: 0.82rem; }
    .epk-booking { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-xl); text-align: center; }
    .epk-rate { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--gold-text); margin-bottom: var(--space-md); }
    .share-bar { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-lg); background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); margin-top: var(--space-2xl); }
    .share-url { flex: 1; padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .epk-footer { text-align: center; margin-top: var(--space-3xl); padding-top: var(--space-xl); border-top: 1px solid var(--border-subtle); color: var(--text-tertiary); font-size: 0.78rem; }
    .edit-btn { position: absolute; top: var(--space-sm); right: var(--space-sm); opacity: 0; transition: opacity var(--duration-fast); }
    .epk-section:hover .edit-btn { opacity: 1; }
    .epk-section { position: relative; }
    .epk-badges { display: flex; gap: var(--space-xs); justify-content: center; margin: var(--space-md) 0; flex-wrap: wrap; }
    .epk-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    .epk-badge.verified { border-color: rgba(52,211,153,0.3); color: var(--status-confirmed); background: rgba(52,211,153,0.08); }
    .epk-badge.gold { border-color: rgba(201,168,76,0.3); color: var(--gold-text); background: rgba(201,168,76,0.08); }
    @media (max-width: 768px) { .epk-name { font-size: 2rem; } .epk-socials { flex-wrap: wrap; justify-content: center; } .perf-item { flex-direction: column; align-items: flex-start; } #epk-inquiry-form > div { grid-template-columns: 1fr !important; } }
    @media print {
      body { background: #fff !important; color: #1a1a1a !important; }
      .nav, #nav-root, .share-bar, .epk-footer, .btn, .epk-socials, .media-embed { display: none !important; }
      .epk-container { margin: 0; padding: 20px; max-width: 100%; }
      .epk-hero { padding: 20px 0; border-bottom: 2px solid #8a92a0; }
      .epk-name { color: #1a1a1a; font-size: 2rem; }
      .epk-meta, .epk-section-title { color: #666; }
      .quote-text, p { color: #333; }
      .quote-card, .perf-item, .rider-item { border-color: #eee; background: #fafafa; }
      .epk-booking { border: 1px solid #eee; }
      .tag--gold { background: #f5f0e0; color: #8b7530; border: 1px solid #d4c48c; }
      .avatar-xlarge { border-color: #c9a84c; }
      .photo-gallery img { width: 150px; height: 100px; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="nav-root"></div>
  <a id="main-content" tabindex="-1" class="sr-only">Main content</a>
    <div class="epk-container">
      <div id="epk-content">
        <div style="text-align:center;padding:var(--space-3xl);color:var(--text-tertiary)">Loading EPK...</div>
      </div>
    </div>
  </div>

  <script>
    let _epkData = null;
    let _isEditMode = false;
    let _artistId = null;

    function renderEPK(data) {
      if (!data) { document.getElementById('epk-content').innerHTML = '<div class="empty-state" style="text-align:center;padding:var(--space-3xl)"><h2>EPK Not Found</h2><p>This artist profile doesn\'t exist.</p><a href="directory.html" class="btn btn-primary">Browse Artists</a></div>'; return; }

      const name = esc(data.stage_name || data.name || 'Unknown');
      const genre = esc(Array.isArray(data.genre) ? data.genre[0] : (data.genre || ''));
      const subgenres = Array.isArray(data.subgenres) ? data.subgenres : [];
      const city = esc(data.city || data.cities_active?.[0] || '');
      // Pre-computed strings reused below (both by the inline renderer
      // AND by the OG-meta updater further down). Keep in sync with the
      // duplicate assignments near line 263.
      const genres      = Array.isArray(data.genre) ? data.genre.join(', ') : (data.genre || '');
      const cityForMeta = (data.cities_active && data.cities_active[0]) || data.city || '';
      const bio = esc(data.bio || data.profiles?.bio || '');
      const avatar = data.avatar_url || data.profiles?.avatar_url;
      const social = data.social_links || data.social || {};
      const rating = data.rating || 0;
      const bookings = data.total_bookings || data.bookings || 0;
      const rateMin = data.base_fee || data.rate_min || 0;
      const rateMax = data.rate_max || rateMin * 2;
      const currency = data.currency || 'AED';
      const quotes = data.press_quotes || [];
      const performances = data.past_performances || [];
      const rider = data.tech_rider || [];
      const initials = (data.stage_name || data.name || 'A').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

      const genreTags = [genre, ...subgenres.map(s => esc(s))].filter(Boolean).map(g => `<span class="tag tag--gold">${g}</span>`).join(' ');

      const socialLinks = Object.entries(social).filter(([k, v]) => v).map(([k, v]) => {
        const icons = { instagram: 'grid', soundcloud: 'music', spotify: 'music', youtube: 'activity' };
        return `<a href="${esc(v)}" target="_blank" rel="noopener">${UI.icon(icons[k] || 'send', 14)} ${k.charAt(0).toUpperCase() + k.slice(1)}</a>`;
      }).join('');

      const quotesHtml = quotes.length ? quotes.map(q => `
        <div class="quote-card"><div class="quote-card-inner">
          <div class="quote-text">${esc(q.quote)}</div>
          <div class="quote-source">${esc(q.source)} ${q.date ? '· ' + q.date : ''}</div>
        </div></div>`).join('') : '<p class="text-tertiary">No press quotes yet</p>';

      const perfHtml = performances.length ? performances.map(p => `
        <div class="perf-item">
          <div class="perf-venue">${esc(p.venue)}</div>
          <div class="perf-event">${esc(p.event)}</div>
          <div class="perf-date">${UI.formatDate(p.date)}</div>
        </div>`).join('') : '<p class="text-tertiary">No past performances listed</p>';

      const riderHtml = rider.length ? rider.map(r => `
        <div class="rider-item">
          <span class="rider-key">${esc(r.category)}</span>
          <span class="rider-value">${esc(r.item)}</span>
        </div>`).join('') : '<p class="text-tertiary">No tech rider specified</p>';

      const editBtnHtml = _isEditMode ? `<a href="artist-profile-edit.html" class="btn btn-secondary btn-sm" style="margin-top:var(--space-md)">Edit Full Profile</a>` : '';

      const artistIdForBooking = _artistId || data.id;

      const badgesHtml = '';

      // QR code (uses a free API)
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=c9a84c&bgcolor=0c0c10&data=' + encodeURIComponent(window.location.href);

      document.getElementById('epk-content').innerHTML = `
        <div class="epk-hero">
          <div class="avatar-xlarge">${avatar ? `<img src="${avatar}" alt="${name}">` : initials}</div>
          <div class="epk-name">${name}</div>
          <div class="epk-meta">${city} ${genre ? '· ' + genre : ''}</div>
          ${badgesHtml}
          <div>${genreTags}</div>
          ${socialLinks ? `<div class="epk-socials">${socialLinks}</div>` : ''}
          ${editBtnHtml}
        </div>


        ${bio ? `<div class="epk-section"><div class="epk-section-title">About</div><p style="color:var(--text-secondary);line-height:1.8;font-size:1.05rem">${bio}</p></div>` : ''}

        <!-- Media Embed -->
        ${(social.soundcloud || social.spotify || social.youtube) ? `<div class="epk-section"><div class="epk-section-title">Listen</div>${UI.mediaEmbed(social.soundcloud || social.spotify || social.youtube)}</div>` : ''}

        <!-- Photo Gallery with download -->
        ${(data.epk_gallery && data.epk_gallery.length) ? `<div class="epk-section"><div class="epk-section-title" style="display:flex;justify-content:space-between;align-items:center">Photos <span style="font-size:0.72rem;color:var(--text-tertiary);text-transform:none;letter-spacing:0">Click to zoom · Right-click to download</span></div><div class="photo-gallery">${data.epk_gallery.map((url, idx) => `<img src="${esc(url)}" alt="Press photo ${idx+1}" loading="lazy" decoding="async" onclick="(function(){let lb=document.getElementById('lb');if(!lb){lb=document.createElement('div');lb.id='lb';lb.className='lightbox';lb.onclick=()=>lb.classList.remove('active');document.body.appendChild(lb)}lb.innerHTML='<img src=\\'${url}\\' alt=Photo>';lb.classList.add('active')})()">`).join('')}</div></div>` : ''}

        <div class="epk-section">
          <div class="epk-section-title">Press</div>
          <div class="quote-grid">${quotesHtml}</div>
        </div>

        <div class="epk-section">
          <div class="epk-section-title">Past Performances</div>
          <div class="perf-list">${perfHtml}</div>
        </div>

        <div class="epk-section">
          <div class="epk-section-title">Technical Rider</div>
          <div class="rider-list">${riderHtml}</div>
        </div>

        <div class="epk-booking">
          <div class="epk-section-title">Booking</div>
          <div class="epk-rate">${UI.currency(rateMin, currency)}${rateMax > rateMin ? ' — ' + UI.currency(rateMax, currency) : ''}</div>
          <div style="margin-bottom:var(--space-md)">${data.status === 'active' || data.available ? '<span class="tag tag--confirmed">Available</span>' : '<span class="tag tag--draft">Unavailable</span>'}</div>
          <div style="display:flex;gap:var(--space-sm);justify-content:center">
            <a href="booking.html?artist=${artistIdForBooking}" class="btn btn-primary">Book This Artist</a>
            <a href="messages.html" class="btn btn-secondary">Contact</a>
          </div>
        </div>

        <!-- Quick Inquiry Form (no login required) -->
        <div class="epk-section">
          <div class="epk-section-title">Quick Inquiry</div>
          <p style="color:var(--text-tertiary);font-size:0.85rem;margin-bottom:var(--space-md)">Interested in booking ${name}? Send a quick inquiry — no account needed.</p>
          <form id="epk-inquiry-form" onsubmit="submitInquiry(event)" style="display:flex;flex-direction:column;gap:var(--space-md)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
              <input type="text" class="form-input" id="inq-name" placeholder="Your name" required>
              <input type="email" class="form-input" id="inq-email" placeholder="Your email" required>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
              <input type="text" class="form-input" id="inq-company" placeholder="Company / Venue (optional)">
              <input type="date" class="form-input" id="inq-date" placeholder="Event date">
            </div>
            <textarea class="form-textarea" id="inq-message" rows="3" placeholder="Tell us about your event..." required></textarea>
            <button type="submit" class="btn btn-primary" id="inq-submit">Send Inquiry</button>
          </form>
        </div>

        <!-- QR Code + Share -->
        <div style="display:grid;grid-template-columns:1fr auto;gap:var(--space-xl);align-items:start;margin-top:var(--space-xl)">
          <div class="share-bar" style="margin:0">
            <span style="font-size:0.85rem;color:var(--text-secondary)">Share:</span>
            <div class="share-url" id="share-url">${window.location.href}</div>
            <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('share-url').textContent);UI.toast('Link copied!','success')">Copy</button>
            ${UI.whatsappShareButton({
              url:     window.location.href,
              // Pre-composed message carries artist context so it lands
              // in a WhatsApp group with everything a promoter needs.
              // Newlines render as line breaks in the chat input.
              message: `${esc(name)} \u2014 live EPK on ROSTR+\n${[genres, cityForMeta].filter(Boolean).join(' \u00b7 ')}\n${window.location.href}`,
              label:   'WhatsApp',
            })}
            <button class="btn btn-ghost btn-sm" onclick="window.print()">Save PDF</button>
          </div>
          <div style="text-align:center">
            <img src="${qrUrl}" alt="QR Code" width="100" height="100" style="border-radius:var(--radius-sm);border:1px solid var(--border-subtle)">
            <div style="font-size:0.68rem;color:var(--text-tertiary);margin-top:4px">Scan to view EPK</div>
          </div>
        </div>

        <div class="epk-footer">
          Powered by <strong>ROSTR+</strong> — The GCC Booking Platform
        </div>
      `;

      const displayName = data.stage_name || data.name || 'Artist';
      document.title = `${displayName} — EPK | ROSTR+`;

      // Update OG / Twitter tags so WhatsApp, iMessage, Twitter, etc. unfurl nicely.
      // `genres` and `cityForMeta` are already in scope from the top of
      // renderEPK (lines ~124-125). Re-declaring with `const` here used
      // to throw `Identifier 'genres' has already been declared`, which
      // killed the whole script tag at parse time and left every visitor
      // stuck on "Loading EPK...". Reuse the existing locals.
      const desc = [genres, cityForMeta].filter(Boolean).join(' — ') || 'ROSTR+ GCC artist — bookings open.';
      const img = data.avatar_url || data.profiles?.avatar_url || 'https://rosterplus.io/icons/og-default.png';
      // Use ?id= so OG snippets, the share-bar URL, and the canonical
      // <link> all match what the rest of the platform emits (artist
      // dashboard, drip emails, iOS share sheet). See the param-read
      // note further down for the back-compat history.
      const url = `https://rosterplus.io/epk.html?id=${encodeURIComponent(_artistId || '')}`;
      const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
      setMeta('meta[property="og:title"]',       `${displayName} — EPK`);
      setMeta('meta[property="og:description"]', desc);
      setMeta('meta[property="og:image"]',       img);
      setMeta('meta[property="og:url"]',         url);
      setMeta('meta[name="twitter:title"]',      `${displayName} — EPK`);
      setMeta('meta[name="twitter:description"]',desc);
      setMeta('meta[name="twitter:image"]',      img);
      setMeta('meta[name="description"]',        desc);

      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', url);

      const ld = {
        '@context': 'https://schema.org',
        '@type':    'MusicGroup',
        name:        displayName,
        description: desc,
        image:       img,
        url,
        genre:       Array.isArray(data.genre) ? data.genre : (data.genre ? [data.genre] : []),
        address:     cityForMeta ? { '@type': 'PostalAddress', addressLocality: cityForMeta } : undefined,
      };
      const ldEl = document.getElementById('epk-ld-json');
      if (ldEl) ldEl.textContent = JSON.stringify(ld);
    }

    // Init
    async function submitInquiry(e) {
      e.preventDefault();
      const btn = document.getElementById('inq-submit');
      btn.disabled = true; btn.textContent = 'Sending...';

      const name = document.getElementById('inq-name').value.trim();
      const email = document.getElementById('inq-email').value.trim();
      const company = document.getElementById('inq-company').value.trim();
      const date = document.getElementById('inq-date').value;
      const message = document.getElementById('inq-message').value.trim();
      const artistName = _epkData?.stage_name || _epkData?.name || 'Artist';

      // Primary path: send via the platform's transactional edge function.
      // Surface failure to the user instead of silently dropping the inquiry.
      const platformRes = await Emails.send('book@rosterplus.io', 'booking_request', {
        promoter_name: name + (company ? ' (' + company + ')' : ''),
        event_name: 'EPK Inquiry — ' + artistName + (date ? ' — ' + date : ''),
        venue_name: company || 'Via EPK',
        event_date: date || 'TBD',
        fee: 'To be discussed',
        booking_url: window.location.href,
        message: message,
        reply_to: email,
      });

      // The artists table doesn't carry an email column directly; the
      // contact email lives on the joined profiles row. Try that path
      // when the artist has claimed their profile (profile_id set).
      const artistEmail = _epkData?.profiles?.email || _epkData?.email;
      if (artistEmail) {
        // Best-effort, don't block the success path on this one — the
        // platform inbox is the source of truth.
        Emails.send(artistEmail, 'booking_request', {
          promoter_name: name,
          event_name: message.substring(0, 60),
          venue_name: company || 'Direct inquiry',
          event_date: date || 'TBD',
          fee: 'To be discussed',
          booking_url: 'mailto:' + email,
          reply_to: email,
        }).catch(() => { /* surface only the primary path */ });
      }

      const host = document.getElementById('epk-inquiry-form');
      if (platformRes && !platformRes.error) {
        host.innerHTML = '<div style="text-align:center;padding:var(--space-xl);color:var(--status-confirmed)"><div style="font-size:1.5rem;margin-bottom:var(--space-sm)">Inquiry Sent</div><p style="color:var(--text-secondary)">Thank you, ' + esc(name) + '. We\'ll get back to you shortly.</p></div>';
        return;
      }

      // Email send failed — give the user a guaranteed-working fallback
      // (mailto: with the inquiry pre-filled) so the inquiry isn't lost.
      const subject = encodeURIComponent('EPK Inquiry — ' + artistName + (date ? ' — ' + date : ''));
      const body = encodeURIComponent(
        'From: ' + name + (company ? ' (' + company + ')' : '') + ' <' + email + '>\n' +
        'Event date: ' + (date || 'TBD') + '\n\n' +
        message
      );
      host.innerHTML =
        '<div style="text-align:center;padding:var(--space-xl);color:var(--status-pending)">' +
        '<div style="font-size:1rem;margin-bottom:var(--space-sm)">We couldn\'t send that automatically.</div>' +
        '<p style="color:var(--text-secondary);margin-bottom:var(--space-md)">No problem — open your email app and send it from there. We\'ve pre-filled the message.</p>' +
        '<a href="mailto:book@rosterplus.io?subject=' + subject + '&body=' + body + '" class="btn btn-primary">Open in email app</a>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', async function() {
      await Auth.ready();
      document.getElementById('nav-root').innerHTML = renderNav('epk');
      if (typeof hydrateIcons === 'function') hydrateIcons();

      const params = new URLSearchParams(window.location.search);
      // Accept both ?id= (the consensus shape used by artist-dashboard's
      // share button, the send-artist-onboarding-drip welcome email, and
      // the iOS share sheet) AND ?artist= (the legacy shape this page
      // used to emit). Either parameter resolves the same artist row.
      // Five producers ship ?id= URLs; previously only ?artist= worked
      // here, so every shared link silently bounced to /directory.html.
      _artistId = params.get('id') || params.get('artist');

      if (_artistId) {
        // Public view mode — anyone can hit /epk.html?id=<id>
        const result = await DB.getArtistEPK(_artistId);
        if (result.success && result.data) {
          _epkData = result.data;          // ← was missing; submitInquiry depends on it
          renderEPK(_epkData);
        } else {
          renderEPK(null);
        }
      } else if (Auth.isLoggedIn() && Auth.role === 'artist') {
        // Edit-preview mode — show own EPK with an "Edit Full Profile" CTA
        _isEditMode = true;
        const result = await DB.getMyArtistProfile();
        if (result.success && result.data) {
          _artistId = result.data.id;
          _epkData = result.data;
          renderEPK(_epkData);
        } else {
          document.getElementById('epk-content').innerHTML = '<div class="empty-state" style="text-align:center;padding:var(--space-3xl)"><h2>No EPK Yet</h2><p>Set up your artist profile to generate a shareable EPK.</p><a href="artist-profile-edit.html?setup=1" class="btn btn-primary">Set up profile</a></div>';
        }
      } else if (Auth.isLoggedIn()) {
        // Logged-in promoter (or other non-artist) hit /epk.html with no
        // artist param. Send them to the directory where they can pick
        // an artist whose EPK they actually want to view. Prevents the
        // "I'm logged in but it bounced me to auth" footer-link bug.
        window.location.href = 'directory.html';
      } else {
        // Anonymous visitor — directory is also the right entry point
        // (it's public). Keeps the URL bar friendly instead of forcing
        // a login they don't need.
        window.location.href = 'directory.html';
      }
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
    <!-- Site-wide footer (rendered by app.js renderFooter()) -->
    <site-footer id="site-footer"></site-footer>
</body>
</html>
