<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Messages — ROSTR+</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://vgjmfpryobsuboukbemr.supabase.co" crossorigin>

  <link rel="stylesheet" href="assets/css/system.css?v=2521872">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/error-logger.js?v=2521872" defer></script>
  <script src="assets/js/app.js?v=2521872" defer></script>
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - var(--nav-height));
    }

    /* ── Conversations Panel ── */
    .conv-panel {
      background: var(--bg-raised);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .conv-header {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border-subtle);
    }

    .conv-header h3 {
      margin-bottom: var(--space-sm);
      font-size: 1.1rem;
    }

    .conv-search {
      position: relative;
    }

    .conv-search input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      outline: none;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .conv-search input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .conv-search input::placeholder { color: var(--text-tertiary); }

    .conv-search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-sm);
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      position: relative;
      margin-bottom: 2px;
    }

    .conv-item:hover { background: var(--bg-card); }

    .conv-item.active {
      background: var(--gold-dim);
      border: 1px solid var(--accent-dim-20);
    }

    .conv-item:not(.active) { border: 1px solid transparent; }

    .conv-info { flex: 1; min-width: 0; }

    .conv-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conv-preview {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .conv-time {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-tertiary);
    }

    .conv-unread {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease infinite;
    }

    /* ── Chat Panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px var(--space-lg);
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(17,17,24,0.6);
      backdrop-filter: blur(12px);
    }

    .chat-header-info h4 {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .chat-header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .status-dot.online { background: var(--status-confirmed); }
    .status-dot.offline { background: var(--text-tertiary); }

    .chat-header-actions {
      margin-left: auto;
      display: flex;
      gap: var(--space-sm);
    }

    /* ── Messages Area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-sep {
      text-align: center;
      padding: var(--space-md) 0;
    }

    .date-sep span {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--bg-base);
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
    }

    .msg {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      line-height: 1.55;
      animation: fadeIn 300ms var(--ease-out) both;
    }

    .msg.received {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .msg.sent {
      align-self: flex-end;
      background: var(--gold-dim);
      border: 1px solid var(--accent-dim-20);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }

    .msg-time {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .msg.sent .msg-time { text-align: right; }

    /* ── Input Bar ── */
    .chat-input-bar {
      display: flex;
      align-items: flex-end;
      gap: var(--space-sm);
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-raised);
    }

    .chat-input-bar textarea {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.88rem;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 40px;
      line-height: 1.5;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .chat-input-bar textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .chat-input-bar textarea::placeholder { color: var(--text-tertiary); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--gold);
      border: none;
      color: var(--text-inverse);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .send-btn:hover { background: #d4b44e; }
    .send-btn:disabled { opacity: 0.3; cursor: default; }
    .send-btn:active { transform: scale(0.95); }

    /* ── Empty chat state ── */
    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: var(--space-md);
      color: var(--text-tertiary);
    }

    .chat-empty svg { opacity: 0.15; }
    .chat-empty p { font-size: 0.92rem; }

    /* ── Mobile ── */
    .mobile-back {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }

    @media (max-width: 768px) {
      .chat-layout { grid-template-columns: 1fr; }
      .conv-panel { display: flex; }
      .chat-panel { display: none; }
      .chat-layout.chat-open .conv-panel { display: none; }
      .chat-layout.chat-open .chat-panel { display: flex; }
      .mobile-back { display: block; }
      .msg { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <a id="main-content" tabindex="-1" class="sr-only">Main content</a>
  <div class="page-shell">
    <div class="chat-layout" id="chatLayout">
      <!-- Conversations Panel -->
      <div class="conv-panel">
        <div class="conv-header">
          <h3>Messages</h3>
          <div class="conv-search">
            <div class="conv-search-icon" id="searchIcon"></div>
            <input type="text" placeholder="Search conversations..." id="convSearch" oninput="filterConversations()">
          </div>
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel" id="chatPanel">
        <div class="chat-header" id="chatHeader">
          <button class="mobile-back" onclick="closeChat()" id="backBtn" aria-label="Back to conversations"></button>
          <div id="chatAvatar"></div>
          <div class="chat-header-info">
            <h4 id="chatName">Select a conversation</h4>
            <div class="chat-header-status">
              <div class="status-dot" id="chatStatusDot"></div>
              <span id="chatStatus"></span>
            </div>
          </div>
          <div class="chat-header-actions">
            <a href="#" class="btn btn-ghost btn-sm" id="bookingLink" style="display:none">View Booking</a>
          </div>
        </div>
        <div class="messages-area" id="messagesArea">
          <div class="chat-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Select a conversation to start messaging</p>
          </div>
        </div>
        <div id="quickRepliesRow" style="display:none;padding:8px 16px 0;gap:6px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--border-subtle)"></div>
        <div class="chat-input-bar" id="chatInputBar" style="display:none">
          <textarea id="msgInput" placeholder="Type a message..." rows="1" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()"></button>
        </div>

        <!-- Quick-reply templates modal -->
        <div id="qrModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);align-items:center;justify-content:center" onclick="if(event.target===this)closeQrModal()">
          <div style="background:var(--bg-raised);border:1px solid var(--border-medium);border-radius:var(--radius-lg);padding:var(--space-lg);width:min(520px,94vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)">
              <div>
                <h3 style="margin:0 0 2px">Quick-reply templates</h3>
                <div style="font-size:0.78rem;color:var(--text-tertiary)">One-tap replies for common responses. Up to 20 saved.</div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="closeQrModal()" aria-label="Close">&times;</button>
            </div>
            <div id="qrList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:var(--space-md)"></div>
            <div style="display:flex;gap:8px">
              <input type="text" id="qrNewInput" class="form-input" placeholder="New template\u2026" maxlength="280" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addQuickReply()}">
              <button class="btn btn-primary btn-sm" onclick="addQuickReply()">Add</button>
            </div>
            <div style="margin-top:var(--space-md);padding-top:var(--space-md);border-top:1px solid var(--border-subtle)">
              <div style="font-size:0.78rem;color:var(--text-tertiary);margin-bottom:8px">Suggested</div>
              <div id="qrSuggested" style="display:flex;flex-wrap:wrap;gap:6px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* Messages page — now thread-per-booking primary, flat DM fallback.
       Every conversation is keyed by:
         { kind: 'booking', bookingId, otherId }   -> booking-scoped
         { kind: 'dm',      otherId }              -> legacy flat DM
       The UI treats them uniformly; only send/load call different DB. */
    let threads = [];              // booking-scoped threads (primary)
    let legacyDMs = [];            // old one-on-one conversations (fallback)
    let activeThread = null;       // { kind, bookingId?, otherId }
    let activeMessages = [];
    let realtimeUnsub = null;
    let readReceiptUnsub = null;

    function threadKey(t) {
      return t.kind === 'booking' ? ('b:' + t.bookingId) : ('dm:' + t.otherId);
    }
    function isActive(t) {
      return activeThread && threadKey(t) === threadKey(activeThread);
    }

    function renderConvList(filter = '') {
      const list = document.getElementById('convList');
      const f = filter.toLowerCase();

      // Booking threads come first, legacy DMs (messages with no
      // booking_id, e.g. pre-booking direct contact) come below.
      const haystack = (s) => (s || '').toLowerCase().includes(f);
      const filteredThreads = threads.filter(t =>
        haystack(t.event_name) || haystack(t.other_user_name) || haystack(t.last_message)
      );
      const filteredDMs = legacyDMs.filter(d =>
        haystack(d.other_user_name) || haystack(d.last_message || d.content)
      );

      if (filteredThreads.length === 0 && filteredDMs.length === 0) {
        list.innerHTML = UI.emptyState({
          icon: 'inbox',
          title: 'No conversations yet',
          body: 'Every booking gets its own thread. Reach out to an artist to start.',
          cta: { label: 'Browse the roster', href: '/directory.html' },
          compact: true,
        });
        return;
      }

      const timeFmt = (iso) => iso ? new Date(iso).toLocaleTimeString('en', { hour: 'numeric', minute: '2-digit', hour12: true }) : '';

      let html = '';

      if (filteredThreads.length > 0) {
        html += `<div style="padding:var(--space-sm) var(--space-md) 4px;font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary)">By booking</div>`;
        html += filteredThreads.map(t => {
          const active = isActive({ kind: 'booking', bookingId: t.booking_id, otherId: t.other_user_id }) ? 'active' : '';
          const unread = t.unread_count > 0;
          const status = t.booking_status || '';
          const safeEvent = esc(t.event_name || 'Performance');
          const safePartner = esc(t.other_user_name || '—');
          const dateLine = t.event_date
            ? new Date(t.event_date + 'T00:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric' })
            : '';
          return `
            <div class="conv-item ${active}"
                 onclick="openBookingThread('${esc(t.booking_id)}','${esc(t.other_user_id)}','${safePartner.replace(/'/g, "\\'")}')">
              ${UI.avatar(t.other_user_name || '?', 40)}
              <div class="conv-info">
                <div class="conv-name" style="display:flex;gap:6px;align-items:center">
                  <span>${safeEvent}</span>
                  ${status ? `<span style="font-family:var(--font-mono);font-size:0.62rem;color:var(--text-tertiary);text-transform:uppercase">${esc(status)}</span>` : ''}
                </div>
                <div class="conv-preview">${safePartner}${dateLine ? ' · ' + esc(dateLine) : ''} · ${esc((t.last_message || '').slice(0, 40))}</div>
              </div>
              <div class="conv-meta">
                <span class="conv-time">${timeFmt(t.last_message_time)}</span>
                ${unread ? `<span class="conv-unread" title="${t.unread_count} unread"></span>` : ''}
              </div>
            </div>
          `;
        }).join('');
      }

      if (filteredDMs.length > 0) {
        html += `<div style="padding:var(--space-md) var(--space-md) 4px;font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary)">Direct messages</div>`;
        html += filteredDMs.map(c => {
          const active = isActive({ kind: 'dm', otherId: c.other_user_id }) ? 'active' : '';
          const name = c.other_user_name || 'Unknown';
          const preview = (c.last_message || c.content || '').slice(0, 60);
          return `
            <div class="conv-item ${active}"
                 onclick="openDMThread('${esc(c.other_user_id)}','${esc(name).replace(/'/g, "\\'")}')">
              ${UI.avatar(name, 40)}
              <div class="conv-info">
                <div class="conv-name">${esc(name)}</div>
                <div class="conv-preview">${esc(preview)}</div>
              </div>
              <div class="conv-meta">
                <span class="conv-time">${timeFmt(c.last_message_time)}</span>
                ${c.unread ? `<span class="conv-unread"></span>` : ''}
              </div>
            </div>
          `;
        }).join('');
      }

      list.innerHTML = html;
    }

    // Open a booking-scoped thread. Shows the event name + partner
    // name in the chat header, and every message we send here carries
    // booking_id so it threads correctly for both parties.
    async function openBookingThread(bookingId, otherUserId, partnerName) {
      activeThread = { kind: 'booking', bookingId, otherId: otherUserId };
      const threadMeta = threads.find(t => t.booking_id === bookingId);
      const headerTitle = threadMeta?.event_name || 'Booking';
      const headerSub = [partnerName, threadMeta?.event_date ? new Date(threadMeta.event_date + 'T00:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric' }) : null].filter(Boolean).join(' · ');

      document.getElementById('chatAvatar').innerHTML = UI.avatar(partnerName || '?', 36);
      document.getElementById('chatName').textContent = headerTitle;
      document.getElementById('chatStatus').innerHTML = esc(headerSub) + ` · <a href="booking-detail.html?id=${esc(bookingId)}" style="color:var(--accent-soft)">Open booking</a>`;
      document.getElementById('messagesArea').innerHTML = `<div style="text-align:center;padding:var(--space-xl);color:var(--text-tertiary)">Loading messages...</div>`;
      document.getElementById('chatInputBar').style.display = '';
      renderQrChips();
      document.getElementById('chatLayout').classList.add('chat-open');
      renderConvList(document.getElementById('convSearch').value);

      const result = await DB.getThreadMessages(bookingId);
      if (result.success) {
        activeMessages = result.data;
        renderMessages(activeMessages);
      } else {
        document.getElementById('messagesArea').innerHTML = `<div style="text-align:center;padding:var(--space-xl);color:var(--status-cancelled)">Failed to load messages</div>`;
      }

      subscribeRealtime();
      setTimeout(() => document.getElementById('msgInput').focus(), 100);
    }

    async function openDMThread(otherUserId, name) {
      activeThread = { kind: 'dm', otherId: otherUserId };
      document.getElementById('chatAvatar').innerHTML = UI.avatar(name, 36);
      document.getElementById('chatName').textContent = name;
      document.getElementById('chatStatus').textContent = 'Direct message';
      document.getElementById('messagesArea').innerHTML = `<div style="text-align:center;padding:var(--space-xl);color:var(--text-tertiary)">Loading messages...</div>`;
      document.getElementById('chatInputBar').style.display = '';
      renderQrChips();
      document.getElementById('chatLayout').classList.add('chat-open');
      renderConvList(document.getElementById('convSearch').value);

      const result = await DB.getMessages(otherUserId);
      if (result.success) {
        activeMessages = result.data;
        renderMessages(activeMessages);
      } else {
        document.getElementById('messagesArea').innerHTML = `<div style="text-align:center;padding:var(--space-xl);color:var(--status-cancelled)">Failed to load messages</div>`;
      }

      subscribeRealtime();
      setTimeout(() => document.getElementById('msgInput').focus(), 100);
    }

    function subscribeRealtime() {
      if (realtimeUnsub) realtimeUnsub();
      if (readReceiptUnsub) readReceiptUnsub();

      // INSERT — new incoming messages
      realtimeUnsub = Realtime.subscribeToMessages((msg) => {
        const relevant =
          activeThread?.kind === 'booking'
            ? msg.booking_id === activeThread.bookingId
            : (msg.sender_id === activeThread?.otherId || msg.receiver_id === activeThread?.otherId);
        if (relevant) {
          activeMessages.push(msg);
          renderMessages(activeMessages);
        }
        loadConversations();
      });

      // UPDATE — read receipts on messages I sent. When the recipient
      // opens the thread and markThreadRead() flips read=true, we get
      // a live postgres_changes UPDATE and can upgrade ✓ to ✓✓ without
      // a full re-fetch.
      readReceiptUnsub = Realtime.subscribeToMyMessageReads((updated) => {
        const idx = activeMessages.findIndex(m => m.id === updated.id);
        if (idx !== -1) {
          activeMessages[idx] = { ...activeMessages[idx], read: updated.read };
          renderMessages(activeMessages);
        }
      });
    }

    // Checkmark glyph used for read receipts on sent messages.
    // Single tick (grey) = sent but not yet read. Double tick (accent) =
    // read by the recipient. Using aria-label for screen readers.
    const RECEIPT_SENT = '<svg class="msg-receipt" viewBox="0 0 18 14" width="16" height="12" aria-label="Sent" style="vertical-align:middle;margin-left:4px;fill:none;stroke:var(--text-tertiary);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><polyline points="3,7 7,11 14,3"/></svg>';
    const RECEIPT_READ = '<svg class="msg-receipt msg-receipt--read" viewBox="0 0 18 14" width="16" height="12" aria-label="Read" style="vertical-align:middle;margin-left:4px;fill:none;stroke:var(--accent);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><polyline points="3,7 7,11 14,3"/><polyline points="7,7 11,11 18,3" style="opacity:0.85"/></svg>';

    function renderMessages(msgs) {
      const area = document.getElementById('messagesArea');
      const myId = Auth.user ? Auth.user.id : null;

      let lastDate = null;
      area.innerHTML = msgs.map((msg, i) => {
        const isMe = msg.sender_id === myId;
        const cls = isMe ? 'sent' : 'received';
        const msgDate = msg.created_at ? new Date(msg.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        const msgTime = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : '';

        let dateSep = '';
        if (msgDate && msgDate !== lastDate) {
          dateSep = `<div class="date-sep"><span>${msgDate}</span></div>`;
          lastDate = msgDate;
        }

        // Read receipts only on messages I sent. Hidden on received
        // messages (they're the other person's — their read state is
        // meaningless from my perspective).
        const receipt = isMe ? (msg.read ? RECEIPT_READ : RECEIPT_SENT) : '';

        return `${dateSep}<div class="msg ${cls}" data-msg-id="${msg.id}" style="animation-delay:${i * 30}ms">${esc(msg.content)}<div class="msg-time">${msgTime}${receipt}</div></div>`;
      }).join('');

      requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeThread) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value = '';
      input.style.height = '40px';

      // Booking threads stamp booking_id so the receiver sees it in
      // their booking-scoped view. DMs leave booking_id null.
      const bookingId = activeThread.kind === 'booking' ? activeThread.bookingId : null;
      const result = await DB.sendMessage(activeThread.otherId, text, bookingId);
      if (result.success) {
        activeMessages.push(result.data);
        renderMessages(activeMessages);
        loadConversations();
      } else {
        UI.toast('Failed to send message', 'error');
        input.value = text;
      }
      btn.disabled = !input.value.trim();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
      setTimeout(() => {
        document.getElementById('sendBtn').disabled = !e.target.value.trim();
      }, 0);
    }

    function autoGrow(el) {
      el.style.height = '40px';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
      document.getElementById('sendBtn').disabled = !el.value.trim();
    }

    // ═══ Quick-reply templates ═══
    // Loaded from DB.getQuickReplies(); falls back to role-specific
    // starter suggestions when empty. Chips render above the composer —
    // tapping one inserts the text into msgInput (doesn't send; user can
    // edit before hitting Send).
    let _qrTemplates = [];

    const QR_SUGGESTED_ARTIST = [
      'Thanks for the request — confirming availability now.',
      'Confirmed, see you then. I\u2019ll send my tech rider separately.',
      'Unfortunately booked that night — can we look at another date?',
      'Running 15 minutes late — see you shortly.',
    ];
    const QR_SUGGESTED_PROMOTER = [
      'Details confirmed — contract coming your way shortly.',
      'Load-in is 90 minutes before doors. Please confirm.',
      'Can you share your tech rider and promo materials?',
      'Payment recorded — you should see it within 1-2 business days.',
    ];

    function suggestedQr() {
      return Auth.role === 'artist' ? QR_SUGGESTED_ARTIST : QR_SUGGESTED_PROMOTER;
    }

    async function loadQuickReplies() {
      const res = await DB.getQuickReplies();
      _qrTemplates = res.success ? (res.data || []) : [];
      renderQrChips();
    }

    function renderQrChips() {
      const row = document.getElementById('quickRepliesRow');
      if (!row) return;
      // Only show when a chat is open
      if (!activeThread) { row.style.display = 'none'; return; }
      row.style.display = 'flex';
      const list = _qrTemplates.length ? _qrTemplates : suggestedQr();
      const truncate = (s) => s.length > 42 ? s.slice(0, 40) + '\u2026' : s;
      row.innerHTML = list.slice(0, 5).map((t, i) => `
        <button class="qr-chip" title="${esc(t)}" onclick="insertQuickReply(${i})"
          style="background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-secondary);padding:4px 10px;border-radius:999px;font-size:0.76rem;cursor:pointer;white-space:nowrap;transition:border-color 120ms ease"
          onmouseover="this.style.borderColor='var(--accent-dim-30)'" onmouseout="this.style.borderColor='var(--border-subtle)'">
          ${esc(truncate(t))}
        </button>
      `).join('') + `
        <button onclick="openQrModal()" title="Manage templates"
          style="background:transparent;border:1px dashed var(--border-subtle);color:var(--text-tertiary);padding:4px 10px;border-radius:999px;font-size:0.76rem;cursor:pointer;white-space:nowrap">
          ${_qrTemplates.length ? 'Manage' : 'Save your own'}
        </button>
      `;
    }

    function insertQuickReply(idx) {
      const list = _qrTemplates.length ? _qrTemplates : suggestedQr();
      const text = list[idx];
      if (!text) return;
      const input = document.getElementById('msgInput');
      // Append if input already has content, else replace
      input.value = input.value.trim() ? (input.value.replace(/\s+$/, '') + ' ' + text) : text;
      autoGrow(input);
      input.focus();
      // Put cursor at end
      const end = input.value.length;
      input.setSelectionRange(end, end);
    }
    window.insertQuickReply = insertQuickReply;

    function openQrModal() {
      document.getElementById('qrModal').style.display = 'flex';
      renderQrList();
      // Populate suggested chips
      const sug = document.getElementById('qrSuggested');
      sug.innerHTML = suggestedQr().map(t => `
        <button class="btn btn-ghost btn-sm" style="font-size:0.76rem" onclick="addSuggestedQr(this)" data-tpl="${esc(t)}">
          + ${esc(t.length > 30 ? t.slice(0, 28) + '\u2026' : t)}
        </button>
      `).join('');
    }
    window.openQrModal = openQrModal;

    function closeQrModal() {
      document.getElementById('qrModal').style.display = 'none';
    }
    window.closeQrModal = closeQrModal;

    function renderQrList() {
      const list = document.getElementById('qrList');
      if (_qrTemplates.length === 0) {
        list.innerHTML = '<div style="padding:12px;color:var(--text-tertiary);font-size:0.82rem;text-align:center">No saved templates yet. Add one below or pick a suggestion.</div>';
        return;
      }
      list.innerHTML = _qrTemplates.map((t, i) => `
        <div style="display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm)">
          <div style="flex:1;font-size:0.85rem;color:var(--text-primary);line-height:1.4;word-break:break-word">${esc(t)}</div>
          <button class="btn btn-ghost btn-sm" style="font-size:0.72rem;padding:4px 8px" onclick="removeQuickReply(${i})">Remove</button>
        </div>
      `).join('');
    }

    async function addQuickReply() {
      const input = document.getElementById('qrNewInput');
      const text = (input.value || '').trim();
      if (!text) return;
      if (_qrTemplates.length >= 20) { UI.toast('Max 20 templates', 'info'); return; }
      _qrTemplates = [..._qrTemplates, text];
      const res = await DB.setQuickReplies(_qrTemplates);
      if (!res.success) { UI.toast(res.error || 'Could not save', 'error'); return; }
      input.value = '';
      renderQrList();
      renderQrChips();
    }
    window.addQuickReply = addQuickReply;

    async function removeQuickReply(idx) {
      _qrTemplates = _qrTemplates.filter((_, i) => i !== idx);
      const res = await DB.setQuickReplies(_qrTemplates);
      if (!res.success) { UI.toast(res.error || 'Could not save', 'error'); return; }
      renderQrList();
      renderQrChips();
    }
    window.removeQuickReply = removeQuickReply;

    async function addSuggestedQr(btn) {
      const tpl = btn.dataset.tpl;
      if (!tpl || _qrTemplates.includes(tpl)) return;
      if (_qrTemplates.length >= 20) { UI.toast('Max 20 templates', 'info'); return; }
      _qrTemplates = [..._qrTemplates, tpl];
      const res = await DB.setQuickReplies(_qrTemplates);
      if (!res.success) { UI.toast(res.error || 'Could not save', 'error'); return; }
      renderQrList();
      renderQrChips();
    }
    window.addSuggestedQr = addSuggestedQr;

    function filterConversations() {
      const q = document.getElementById('convSearch').value;
      renderConvList(q);
    }

    function closeChat() {
      document.getElementById('chatLayout').classList.remove('chat-open');
      activeThread = null;
      renderConvList();
    }

    async function loadConversations() {
      // Load both sources in parallel. Booking threads are primary;
      // legacy DMs are shown below as a fallback for pre-booking
      // direct contacts.
      const [threadsRes, dmsRes] = await Promise.all([
        DB.getBookingThreads(),
        DB.getConversations(),
      ]);

      threads = (threadsRes.success && threadsRes.data) ? threadsRes.data : [];

      // Filter legacy DMs to exclude any partner who's already in a
      // booking thread — avoids showing the same conversation twice.
      const threadPartners = new Set(threads.map(t => t.other_user_id));
      legacyDMs = (dmsRes.success && dmsRes.data)
        ? dmsRes.data.filter(c => !threadPartners.has(c.other_user_id))
        : [];

      renderConvList(document.getElementById('convSearch').value);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { window.location.href = 'auth.html'; return; }

      document.getElementById('nav-root').innerHTML = renderNav('messages');
      document.getElementById('searchIcon').innerHTML = UI.icon('search', 14);
      document.getElementById('backBtn').innerHTML = '&larr; Back';
      document.getElementById('sendBtn').innerHTML = UI.icon('send', 16);

      await loadConversations();
      loadQuickReplies().catch(() => {});

      // Deep-link support.
      //   ?booking=<uuid>          — open that booking's thread.
      //     Needs the thread list loaded first so we can pick the
      //     partner's id + display name from the hydrated metadata.
      //   ?user=<uuid>&name=<...>  — legacy DM open (kept for back-compat).
      const params = new URLSearchParams(window.location.search);
      const bookingId = params.get('booking');
      const userId = params.get('user');
      const name = params.get('name');
      if (bookingId) {
        const t = threads.find(x => x.booking_id === bookingId);
        if (t) {
          openBookingThread(bookingId, t.other_user_id, t.other_user_name);
        } else {
          // Thread doesn't exist yet — happens when a booking was just
          // created and no one's sent a message. Fall back to a blank
          // thread pre-seeded with the booking so the first send works.
          // We need to fetch booking metadata to know the partner.
          (async () => {
            const { data } = await _sb.from('bookings')
              .select('id, event_name, event_date, promoter_id, artists(profile_id, stage_name, profiles(display_name))')
              .eq('id', bookingId)
              .single();
            if (!data) return;
            const myId = Auth.user.id;
            const iAmPromoter = data.promoter_id === myId;
            const otherId = iAmPromoter
              ? data.artists?.profile_id
              : data.promoter_id;
            const otherName = iAmPromoter
              ? (data.artists?.stage_name || data.artists?.profiles?.display_name || 'Artist')
              : 'Promoter';
            if (!otherId) {
              UI.toast('This artist hasn\u2019t signed up yet — no inbox to write to.', 'info');
              return;
            }
            // Seed a stub in the threads array so openBookingThread
            // finds its metadata.
            threads.unshift({
              booking_id: bookingId,
              other_user_id: otherId,
              other_user_name: otherName,
              event_name: data.event_name,
              event_date: data.event_date,
              last_message: '',
              last_message_time: new Date().toISOString(),
              unread_count: 0,
            });
            openBookingThread(bookingId, otherId, otherName);
          })();
        }
      } else if (userId) {
        openDMThread(userId, name || 'Artist');
      }
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
