<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Booking — ROSTR+ GCC</title>
  <link rel="stylesheet" href="assets/css/system.css">
  <style>
    .bd-wrap { max-width: 900px; margin: 0 auto; padding: var(--space-2xl) var(--space-lg); }
    .bd-head { display:flex; align-items: flex-start; justify-content: space-between; gap: var(--space-md); margin-bottom: var(--space-xl); flex-wrap: wrap; }
    .bd-head h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .bd-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .bd-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: var(--space-lg);
    }
    @media (max-width: 780px) { .bd-grid { grid-template-columns: 1fr; } }
    .bd-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-xl);
      backdrop-filter: blur(14px);
    }
    .bd-card + .bd-card { margin-top: var(--space-lg); }
    .bd-card h3 { font-family: var(--font-display); font-size: 1.05rem; letter-spacing: -0.02em; margin-bottom: var(--space-md); }
    .bd-facts { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-md); }
    @media (max-width: 520px) { .bd-facts { grid-template-columns: 1fr; } }
    .bd-fact .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .bd-fact .val { color: var(--text-primary); font-weight: 500; font-size: 0.95rem; }
    .bd-fact .val.mono { font-family: var(--font-mono); font-size: 0.88rem; }
    .bd-notes {
      background: var(--bg-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      margin-top: var(--space-sm);
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .bd-actions { display: flex; gap: var(--space-sm); flex-wrap: wrap; margin-top: var(--space-lg); }
    .bd-timeline { position: relative; padding-left: 18px; }
    .bd-timeline::before {
      content: '';
      position: absolute;
      left: 5px; top: 6px; bottom: 6px;
      width: 1px;
      background: var(--border-subtle);
    }
    .bd-timeline-item { position: relative; padding: 6px 0 10px; }
    .bd-timeline-item::before {
      content: '';
      position: absolute;
      left: -18px; top: 10px;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--text-tertiary);
      border: 2px solid var(--bg-base);
    }
    .bd-timeline-item.current::before {
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim-20);
    }
    .bd-timeline-item .when {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-tertiary);
    }
    .bd-timeline-item .what {
      font-size: 0.92rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .bd-empty {
      padding: var(--space-2xl);
      text-align: center;
      color: var(--text-tertiary);
    }

    /* Status tag wrapping — sit nicely beside the h1 on any breakpoint. */
    .bd-head > span.tag { flex-shrink: 0; }

    /* ── Print (Save as PDF) ─────────────────────────────────
       Same pattern as contract.html / invoice.html — swap to a
       clean black-on-white layout, hide nav + toolbar, flatten
       backdrop-filter cards to plain bordered boxes. */
    @media print {
      body { background: #fff !important; color: #1a1a1a !important; }
      .nav, nav-root, #nav-root, .bd-toolbar, .modal-overlay,
      .btn, .bd-actions { display: none !important; }
      .bd-wrap { max-width: 100%; padding: 0; }
      .bd-grid { grid-template-columns: 1.4fr 1fr !important; gap: 24px !important; }
      .bd-card {
        background: #fff !important;
        border: 1px solid #ccc !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        padding: 20px !important;
        page-break-inside: avoid;
      }
      .bd-card h3 { color: #000 !important; }
      .bd-head h1, .bd-fact .val, .bd-card h3,
      .bd-timeline-item .what { color: #000 !important; }
      .bd-fact .label, .bd-eyebrow, .bd-timeline-item .when { color: #555 !important; }
      .bd-notes { background: #f7f7f7 !important; border-color: #ccc !important; color: #222 !important; }
      .bd-timeline::before, .bd-timeline-item::before { background: #999 !important; }
      .bd-timeline-item.current::before {
        background: #000 !important;
        box-shadow: 0 0 0 3px rgba(0,0,0,0.15) !important;
      }
      /* Status pill — reset accent bg/border to something printable */
      .tag {
        background: #eee !important;
        color: #000 !important;
        border: 1px solid #999 !important;
        box-shadow: none !important;
      }
      /* Drop the animated reveal so print doesn't miss frames */
      .lp-anim { animation: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main class="bd-wrap">
      <div class="bd-toolbar" style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);margin-bottom: var(--space-md);flex-wrap:wrap">
        <a href="javascript:history.back()" class="btn btn-ghost btn-sm">&larr; Back</a>
        <button class="btn btn-secondary btn-sm" onclick="window.print()">Save as PDF</button>
      </div>
      <div id="bd-root" class="bd-empty">Loading booking…</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/error-logger.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let _booking = null;
    let _viewerRole = null; // 'promoter' | 'artist' — determined from current user's relation to the booking
    let _payments = [];     // all payment rows for this booking (reverse chronological)

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso + (iso.length === 10 ? 'T00:00:00' : '')).toLocaleDateString('en', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
      });
    }
    function fmtDateTime(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });
    }
    function fmtTime(t) {
      if (!t) return '—';
      // strip seconds + timezone offsets if present
      return String(t).slice(0, 5);
    }
    function fmtMoney(n, currency) {
      if (!n) return '—';
      return (currency || 'AED') + ' ' + Number(n).toLocaleString();
    }
    function fmtDuration(mins) {
      if (!mins) return '—';
      const h = mins / 60;
      return (h % 1 === 0 ? h : h.toFixed(1)) + ' hrs';
    }

    // Build the status timeline — shows the full lifecycle with the
    // current stage highlighted. Cancelled bookings truncate early.
    function renderTimeline(b) {
      const events = [
        { key: 'inquiry',    label: 'Requested', at: b.created_at },
        { key: 'pending',    label: 'Under review', at: null },
        { key: 'confirmed',  label: 'Accepted by artist', at: null },
        { key: 'contracted', label: 'Contract issued', at: null },
        { key: 'completed',  label: 'Gig performed', at: null },
      ];
      const order = ['inquiry','pending','confirmed','contracted','completed'];
      const currentIdx = order.indexOf(b.status);
      const cancelled = b.status === 'cancelled';
      const display = cancelled
        ? [events[0], { key: 'cancelled', label: 'Cancelled', at: b.updated_at }]
        : events;
      return display.map(ev => {
        const isCurrent = (cancelled && ev.key === 'cancelled') ||
                          (!cancelled && ev.key === b.status);
        return `<div class="bd-timeline-item ${isCurrent ? 'current' : ''}">
          ${ev.at ? `<div class="when">${fmtDateTime(ev.at)}</div>` : ''}
          <div class="what">${esc(ev.label)}</div>
        </div>`;
      }).join('');
    }

    function renderActions(b) {
      // Context-aware action buttons. Always start with "Open messages"
      // as the universal fallback — every booking has a thread.
      const actions = [];

      // Promoter-only actions
      if (_viewerRole === 'promoter') {
        if (b.status === 'inquiry' || b.status === 'pending') {
          actions.push(`<button class="btn btn-ghost btn-sm" onclick="cancelBooking()">Cancel booking</button>`);
        }
        if (['confirmed','contracted'].includes(b.status)) {
          actions.push(`<a class="btn btn-secondary btn-sm" href="contracts.html?booking=${esc(b.id)}">Manage contract</a>`);
        }
      }

      // Artist-only actions
      if (_viewerRole === 'artist' && b.status === 'pending') {
        actions.push(`<button class="btn btn-primary btn-sm" onclick="acceptBooking()">Accept</button>`);
        actions.push(`<button class="btn btn-ghost btn-sm" onclick="rejectBooking()">Decline</button>`);
      }

      // Deep-link into the booking-scoped thread. messages.html sees
      // ?booking=<id> and opens that thread, seeding a blank one if
      // no messages exist yet.
      actions.push(`<a class="btn btn-secondary btn-sm" href="messages.html?booking=${esc(b.id)}">Open messages</a>`);

      // Hide / Unhide — always available to both sides. Soft-hides the
      // booking from the caller's own list without affecting the other
      // party. See DB.hideBooking() for role detection.
      const alreadyHidden = _viewerRole === 'promoter' ? !!b.hidden_by_promoter : !!b.hidden_by_artist;
      if (alreadyHidden) {
        actions.push(`<button class="btn btn-ghost btn-sm" onclick="hideBooking(false)">Unhide from my list</button>`);
      } else {
        actions.push(`<button class="btn btn-ghost btn-sm" onclick="hideBooking(true)" style="color:var(--text-tertiary)">Hide from my list</button>`);
      }
      return actions.join('');
    }

    async function hideBooking(hide) {
      if (hide && !confirm('Hide this booking from your list? You can restore it later from the "Show hidden" toggle on the bookings page.')) return;
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;
      const res = await DB.hideBooking(id, hide);
      if (!res.success) { UI.toast(res.error || 'Could not update', 'error'); return; }
      UI.toast(hide ? 'Booking hidden' : 'Booking restored', 'success');
      // If they hid it from the detail page, bounce back to the list.
      if (hide) { location.href = 'bookings.html'; }
      else { location.reload(); }
    }

    // ── Payments block ─────────────────────────────────────
    // Shows payment rows for the booking + a context-aware action:
    // promoter sees "Record payment" when nothing's logged yet or
    // when the last payment is in a terminal state; artist sees
    // "Confirm received" when a payment is in processing.

    function renderPaymentsCard(b) {
      const rows = _payments;
      const hasOpenRow = rows.find(p => p.status === 'processing' && !p.artist_confirmed_at);
      const totalPaid = rows
        .filter(p => p.status === 'completed')
        .reduce((s, p) => s + Number(p.amount || 0), 0);
      const currency = (rows[0]?.currency || b.currency || 'AED');

      // Promoter action: record a new payment, unless an unconfirmed
      // one is already in flight (avoid stacking duplicates — they
      // confirm the artist got the current one first).
      let actionHtml = '';
      if (_viewerRole === 'promoter' && !hasOpenRow) {
        actionHtml = `<button class="btn btn-primary btn-sm" onclick="openRecordPaymentDialog()">Record payment</button>`;
      }
      if (_viewerRole === 'artist' && hasOpenRow) {
        actionHtml = `<button class="btn btn-primary btn-sm" onclick="confirmPayment('${esc(hasOpenRow.id)}')">Confirm received ${fmtMoney(hasOpenRow.amount, hasOpenRow.currency)}</button>`;
      }

      const rowHtml = rows.length === 0
        ? UI.emptyState({ icon: 'dollar', title: 'No payments yet', body: 'Record a transfer once the booking is confirmed.', compact: true })
        : rows.map(p => {
            const amount = fmtMoney(p.amount, p.currency);
            const when = p.paid_at ? fmtDateTime(p.paid_at)
                       : p.promoter_recorded_at ? fmtDateTime(p.promoter_recorded_at)
                       : fmtDateTime(p.created_at);
            const ref = p.payout_reference || p.invoice_number || '—';
            return `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-sm);padding:var(--space-sm) 0;border-top:1px solid var(--border-subtle)">
                <div style="flex:1;min-width:0">
                  <div style="display:flex;gap:8px;align-items:center;font-weight:500">
                    <span class="val mono" style="font-family:var(--font-mono);font-weight:600">${amount}</span>
                    ${UI.statusTag(p.status)}
                  </div>
                  <div style="font-size:0.72rem;color:var(--text-tertiary);margin-top:2px;font-family:var(--font-mono)">
                    ${esc(ref)} · ${esc(p.type || 'final')} · ${esc(when)}
                  </div>
                </div>
                ${p.invoice_number ? `<a class="btn btn-ghost btn-sm" href="invoice.html?id=${esc(p.id)}" target="_blank">Invoice</a>` : ''}
              </div>
            `;
          }).join('');

      return `
        <div class="bd-card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);margin-bottom:var(--space-md)">
            <h3 style="margin:0">Payments</h3>
            ${actionHtml}
          </div>
          ${totalPaid > 0 ? `
            <div class="bd-facts" style="grid-template-columns: 1fr 1fr;margin-bottom:var(--space-sm)">
              <div class="bd-fact">
                <div class="label">Paid to date</div>
                <div class="val mono">${fmtMoney(totalPaid, currency)}</div>
              </div>
              <div class="bd-fact">
                <div class="label">Fee on booking</div>
                <div class="val mono">${fmtMoney(b.fee, b.currency)}</div>
              </div>
            </div>
          ` : ''}
          ${rowHtml}
        </div>
      `;
    }

    // Modal for recording a payment. Simple inline DOM — no need for
    // a separate modal component when only booking-detail uses it.
    function openRecordPaymentDialog() {
      const b = _booking;
      if (!b) return;
      const defaultAmount = b.fee || 0;
      const currency = b.currency || 'AED';

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay active';
      overlay.style.zIndex = '2000';
      overlay.innerHTML = `
        <div class="modal" style="max-width:480px">
          <div class="modal-header">
            <h3>Record payment</h3>
            <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">
              <span class="js-icon" data-icon="x" data-size="16"></span>
            </button>
          </div>
          <p class="text-secondary" style="font-size:0.88rem;margin-bottom:var(--space-md)">
            Log a bank transfer you've sent to the artist. An invoice number is generated automatically, and the artist gets an email to confirm receipt.
          </p>
          <div class="bd-facts" style="grid-template-columns: 1fr 1fr;margin-bottom:var(--space-md)">
            <div class="form-group">
              <label class="form-label">Amount</label>
              <input type="number" class="form-input" id="pay-amount" value="${defaultAmount}" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label class="form-label">Currency</label>
              <select class="form-select" id="pay-currency">
                ${['AED','SAR','QAR','KWD','BHD','OMR','USD','EUR','EGP'].map(c => `<option ${c === currency ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:var(--space-md)">
            <label class="form-label">Type</label>
            <select class="form-select" id="pay-type">
              <option value="final">Final payment</option>
              <option value="deposit">Deposit</option>
              <option value="milestone">Milestone</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:var(--space-md)">
            <label class="form-label">Bank reference (optional)</label>
            <input type="text" class="form-input" id="pay-reference" placeholder="e.g. ENBD TRX-2026-04-21-8372">
          </div>
          <div class="form-group" style="margin-bottom:var(--space-lg)">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-textarea" id="pay-notes" rows="2" placeholder="Internal note to yourself..."></textarea>
          </div>
          <div style="display:flex;gap:var(--space-sm);justify-content:flex-end">
            <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
            <button class="btn btn-primary" id="pay-submit">Record payment</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      if (typeof hydrateIcons === 'function') hydrateIcons(overlay);

      overlay.querySelector('#pay-submit').addEventListener('click', async () => {
        const btn = overlay.querySelector('#pay-submit');
        btn.disabled = true;
        btn.textContent = 'Recording…';
        const payload = {
          booking_id: b.id,
          amount: Number(overlay.querySelector('#pay-amount').value) || 0,
          currency: overlay.querySelector('#pay-currency').value,
          type: overlay.querySelector('#pay-type').value,
          payout_reference: overlay.querySelector('#pay-reference').value.trim() || null,
          notes: overlay.querySelector('#pay-notes').value.trim() || null,
        };
        if (!payload.amount) {
          UI.toast('Amount must be positive', 'warning');
          btn.disabled = false;
          btn.textContent = 'Record payment';
          return;
        }
        const res = await DB.recordPayment(payload);
        if (!res.success) {
          UI.toast('Failed: ' + (res.error || ''), 'error');
          btn.disabled = false;
          btn.textContent = 'Record payment';
          return;
        }
        UI.toast('Payment recorded · artist notified', 'success');
        overlay.remove();
        await load();
      });
    }

    async function confirmPayment(paymentId) {
      if (!confirm('Confirm you have received this payment? This marks the booking as paid.')) return;
      const res = await DB.confirmPaymentReceived(paymentId);
      if (!res.success) { UI.toast('Failed: ' + (res.error || ''), 'error'); return; }
      UI.toast('Payment confirmed ✓', 'success');
      await load();
    }

    async function acceptBooking() {
      if (!confirm('Accept this booking request?')) return;
      const res = await DB.acceptBooking(_booking.id, '');
      if (!res.success) { UI.toast('Failed: ' + (res.error || ''), 'error'); return; }
      UI.toast('Booking accepted ✓', 'success');
      setTimeout(load, 500);
    }
    async function rejectBooking() {
      const reason = prompt('Optional message to the promoter:') || '';
      const res = await DB.rejectBooking(_booking.id, reason);
      if (!res.success) { UI.toast('Failed: ' + (res.error || ''), 'error'); return; }
      UI.toast('Booking declined', 'info');
      setTimeout(load, 500);
    }
    async function cancelBooking() {
      if (!confirm('Cancel this booking? The artist will be notified.')) return;
      const res = await DB.updateBookingStatus(_booking.id, 'cancelled');
      if (!res.success) { UI.toast('Failed: ' + (res.error || ''), 'error'); return; }
      UI.toast('Booking cancelled', 'info');
      setTimeout(load, 500);
    }

    function render(b) {
      const root = document.getElementById('bd-root');
      const artist = b.artists || {};
      const profile = artist.profiles || {};
      const promoter = b.promoter || {};
      const artistName = artist.stage_name || profile.display_name || 'Artist';
      const promoterName = promoter.display_name || '—';

      // OG-style update of document title so shared links look decent
      document.title = `${b.event_name || 'Booking'} — ROSTR+ GCC`;

      root.classList.remove('bd-empty');
      root.innerHTML = `
        <div class="bd-head">
          <div>
            <div class="bd-eyebrow">${esc(b.status || '—')}</div>
            <h1>${esc(b.event_name || 'Performance')}</h1>
            <p class="text-secondary" style="margin-top:4px">
              ${esc(artistName)} · ${fmtDate(b.event_date)}
            </p>
          </div>
          ${UI.statusTag(b.status)}
        </div>

        <div class="bd-grid">
          <div>
            <div class="bd-card">
              <h3>Event details</h3>
              <div class="bd-facts">
                <div class="bd-fact"><div class="label">Event</div><div class="val">${esc(b.event_name || '—')}</div></div>
                <div class="bd-fact"><div class="label">Date</div><div class="val">${fmtDate(b.event_date)}</div></div>
                <div class="bd-fact"><div class="label">Start time</div><div class="val mono">${fmtTime(b.event_time)}</div></div>
                <div class="bd-fact"><div class="label">Set length</div><div class="val">${fmtDuration(b.set_duration)}</div></div>
                <div class="bd-fact"><div class="label">Venue</div><div class="val">${esc(b.venue || b.venue_name || '—')}</div></div>
                <div class="bd-fact"><div class="label">Fee</div><div class="val mono">${fmtMoney(b.fee, b.currency)}</div></div>
              </div>
              ${b.notes ? `
                <div style="margin-top:var(--space-lg)">
                  <div class="label" style="font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary);margin-bottom:4px">Notes</div>
                  <div class="bd-notes">${esc(b.notes)}</div>
                </div>
              ` : ''}
              <div class="bd-actions">${renderActions(b)}</div>
            </div>

            <div class="bd-card">
              <h3>Parties</h3>
              <div class="bd-facts">
                <div class="bd-fact">
                  <div class="label">Artist</div>
                  <div class="val">${esc(artistName)}</div>
                  ${b.artist_id ? `<a class="text-tertiary" style="font-size:0.82rem" href="profile.html?id=${esc(b.artist_id)}">View profile →</a>` : ''}
                </div>
                <div class="bd-fact">
                  <div class="label">Promoter</div>
                  <div class="val">${esc(promoterName)}</div>
                </div>
              </div>
            </div>

            ${renderPaymentsCard(b)}
          </div>

          <div>
            <div class="bd-card">
              <h3>Status timeline</h3>
              <div class="bd-timeline">${renderTimeline(b)}</div>
            </div>

            <div class="bd-card">
              <h3>Booking reference</h3>
              <div class="bd-facts" style="grid-template-columns: 1fr">
                <div class="bd-fact">
                  <div class="label">ID</div>
                  <div class="val mono" style="font-size:0.78rem;word-break:break-all">${esc(b.id)}</div>
                </div>
                <div class="bd-fact">
                  <div class="label">Created</div>
                  <div class="val mono" style="font-size:0.82rem">${fmtDateTime(b.created_at)}</div>
                </div>
                ${b.updated_at && b.updated_at !== b.created_at ? `
                  <div class="bd-fact">
                    <div class="label">Last updated</div>
                    <div class="val mono" style="font-size:0.82rem">${fmtDateTime(b.updated_at)}</div>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function load() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) {
        document.getElementById('bd-root').innerHTML = '<div class="bd-empty"><h3>No booking ID</h3><p>Return to bookings and pick one.</p></div>';
        return;
      }
      // Fetch the booking with both sides' metadata. RLS guarantees we
      // only see bookings we're party to.
      const { data, error } = await _sb.from('bookings')
        .select('*, artists(id, stage_name, profiles(display_name)), promoter:profiles!promoter_id(display_name, avatar_url, email)')
        .eq('id', id)
        .single();
      if (error || !data) {
        document.getElementById('bd-root').innerHTML = '<div class="bd-empty"><h3>Booking not found</h3><p>It may have been cancelled or you don\u2019t have access.</p></div>';
        return;
      }

      _booking = data;
      // Figure out viewer role so action buttons match the right party.
      if (Auth.user && data.promoter_id === Auth.user.id) _viewerRole = 'promoter';
      else _viewerRole = 'artist';

      // Payments are a separate query — cheaper than hammering every
      // booking list view with a nested select.
      const payRes = await DB.getPaymentsForBooking(data.id);
      _payments = (payRes.success && payRes.data) ? payRes.data : [];

      render(data);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { Auth.require(); return; }
      document.getElementById('nav-root').innerHTML = renderNav('bookings');
      if (typeof hydrateIcons === 'function') hydrateIcons();
      await load();
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
