<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Contract — ROSTR+ GCC</title>
  <link rel="stylesheet" href="assets/css/system.css">
  <style>
    /* Screen styling — matches app look */
    .c-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--space-lg);
    }
    .c-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }
    .c-paper {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3xl) var(--space-2xl);
      backdrop-filter: blur(14px);
    }
    .c-brand {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .c-brand span { color: var(--text-secondary); font-weight: 500; }
    .c-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
    }
    .c-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      letter-spacing: -0.03em;
      margin: var(--space-md) 0 var(--space-xl);
    }
    .c-section { margin-bottom: var(--space-xl); }
    .c-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-sm);
    }
    .c-facts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }
    .c-fact .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .c-fact .val { color: var(--text-primary); font-weight: 500; }
    .c-body {
      color: var(--text-secondary);
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .c-sign-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      margin-top: var(--space-xl);
    }
    .c-sign-box {
      border: 1px dashed var(--border-medium);
      border-radius: var(--radius-sm);
      padding: var(--space-lg);
      min-height: 120px;
      position: relative;
    }
    .c-sign-box.signed {
      border-style: solid;
      border-color: var(--accent-dim-30);
      background: var(--accent-dim-05);
    }
    .c-sign-box .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-sm);
    }
    .c-sign-box .signature {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-style: italic;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .c-sign-box .meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-tertiary);
      line-height: 1.4;
    }
    .c-audit {
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-subtle);
    }
    .c-audit ul { list-style: none; padding: 0; }
    .c-audit li {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-tertiary);
      padding: 4px 0;
    }
    @media (max-width: 640px) {
      .c-facts, .c-sign-grid { grid-template-columns: 1fr; }
    }

    /* ── Print styling (Save as PDF) ── */
    @media print {
      body { background: #fff !important; color: #1a1a1a !important; }
      .nav, nav-root, .c-toolbar { display: none !important; }
      .c-paper {
        background: #fff !important;
        border: none !important;
        padding: 0 !important;
        backdrop-filter: none !important;
      }
      .c-brand { color: #000; }
      .c-brand span { color: #666; }
      .c-eyebrow, .c-sign-box .label, .c-audit li, .c-fact .label { color: #555 !important; }
      .c-title, .c-section h2, .c-fact .val, .c-sign-box .signature { color: #000 !important; }
      .c-body { color: #333 !important; }
      .c-sign-box { border-color: #999 !important; background: #fff !important; }
      .c-sign-box.signed { border-color: #1a8a4a !important; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main id="main-content" class="c-wrap">
      <div class="c-toolbar">
        <a href="contracts.html" class="btn btn-ghost btn-sm">&larr; Back to contracts</a>
        <div style="display:flex;gap:8px">
          <button id="c-sign-btn" class="btn btn-primary btn-sm" style="display:none">Sign contract</button>
          <button class="btn btn-secondary btn-sm" onclick="window.print()">Save as PDF</button>
        </div>
      </div>

      <div class="c-paper" id="c-paper">
        <div class="c-eyebrow">Loading contract…</div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/error-logger.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let _contract = null;

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });
    }

    function renderContract(c) {
      const b = c.bookings || {};
      const artist = b.artists || {};
      const profiles = artist.profiles || {};
      const artistName = artist.stage_name || profiles.display_name || 'Artist';
      const eventName = b.event_name || c.title || 'Performance';
      const eventDate = b.event_date ? new Date(b.event_date + 'T00:00:00').toLocaleDateString('en', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) : '—';
      const venue = b.venue_name || b.venue || '—';
      const fee = (b.fee || 0).toLocaleString();
      const currency = b.currency || 'AED';
      const issued = formatDate(c.created_at);

      const promoterSignedBlock = c.promoter_signed
        ? `<div class="signature">✓ Signed</div>
           <div class="meta">
             ${formatDate(c.promoter_signed_at)}<br>
             ${c.promoter_signed_ua ? '<span title="User agent at signing">' + esc(c.promoter_signed_ua.slice(0, 80)) + '</span>' : ''}
           </div>`
        : '<div class="meta">Awaiting signature</div>';

      const artistSignedBlock = c.artist_signed
        ? `<div class="signature">✓ Signed</div>
           <div class="meta">
             ${formatDate(c.artist_signed_at)}<br>
             ${c.artist_signed_ua ? '<span title="User agent at signing">' + esc(c.artist_signed_ua.slice(0, 80)) + '</span>' : ''}
           </div>`
        : '<div class="meta">Awaiting signature</div>';

      const audit = Array.isArray(c.audit_log) ? c.audit_log : [];
      const auditHtml = audit.length
        ? `<div class="c-audit">
             <div class="c-eyebrow">Signing audit log</div>
             <ul>${audit.map(e => `<li>${formatDate(e.at)} — ${esc(e.event)}</li>`).join('')}</ul>
           </div>`
        : '';

      const body = c.content || `This agreement is entered between the Promoter and the Artist for the performance described above.\n\nThe Artist agrees to perform as specified. The Promoter agrees to pay the fee as specified. Cancellation terms apply per the ROSTR+ platform terms of service.\n\nBoth parties acknowledge that signing this contract on the ROSTR+ platform constitutes a binding agreement under applicable law.`;

      document.getElementById('c-paper').innerHTML = `
        <div class="c-brand">ROSTR<span>+</span></div>
        <div class="c-eyebrow">Performance Contract · Issued ${issued}</div>
        <h1 class="c-title">${esc(c.title || 'Performance Contract')}</h1>

        <div class="c-section">
          <h2>Parties & event</h2>
          <div class="c-facts">
            <div class="c-fact"><div class="label">Artist</div><div class="val">${esc(artistName)}</div></div>
            <div class="c-fact"><div class="label">Event</div><div class="val">${esc(eventName)}</div></div>
            <div class="c-fact"><div class="label">Date</div><div class="val">${esc(eventDate)}</div></div>
            <div class="c-fact"><div class="label">Venue</div><div class="val">${esc(venue)}</div></div>
            <div class="c-fact"><div class="label">Fee</div><div class="val">${esc(currency)} ${fee}</div></div>
            <div class="c-fact"><div class="label">Contract ID</div><div class="val" style="font-family:var(--font-mono);font-size:0.82rem">${esc(c.id)}</div></div>
          </div>
        </div>

        <div class="c-section">
          <h2>Terms</h2>
          <div class="c-body">${esc(body)}</div>
        </div>

        <div class="c-sign-grid">
          <div class="c-sign-box ${c.promoter_signed ? 'signed' : ''}">
            <div class="label">Promoter</div>
            ${promoterSignedBlock}
          </div>
          <div class="c-sign-box ${c.artist_signed ? 'signed' : ''}">
            <div class="label">Artist</div>
            ${artistSignedBlock}
          </div>
        </div>

        ${auditHtml}
      `;

      // Show sign button only if the current user's side hasn't signed yet
      const myRole = Auth.role === 'promoter' ? 'promoter' : (Auth.role === 'artist' ? 'artist' : null);
      const btn = document.getElementById('c-sign-btn');
      if (myRole === 'promoter' && !c.promoter_signed) {
        btn.textContent = 'Sign as Promoter';
        btn.style.display = '';
      } else if (myRole === 'artist' && !c.artist_signed) {
        btn.textContent = 'Sign as Artist';
        btn.style.display = '';
      } else {
        btn.style.display = 'none';
      }
    }

    async function handleSign() {
      if (!_contract) return;
      const role = Auth.role === 'promoter' ? 'promoter' : 'artist';
      if (!confirm(`Sign this contract as ${role}? This is legally binding.`)) return;

      const btn = document.getElementById('c-sign-btn');
      btn.disabled = true;
      btn.textContent = 'Signing…';

      const { error } = await DB.signContract(_contract.id, role);
      if (error) {
        UI.toast('Failed: ' + (error.message || error), 'error');
        btn.disabled = false;
        btn.textContent = 'Sign contract';
        return;
      }
      UI.toast('Contract signed ✓', 'success');
      // Reload the contract so the signature block + audit log refresh
      await loadContract();
    }

    async function loadContract() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) {
        document.getElementById('c-paper').innerHTML = '<div class="c-eyebrow">No contract ID in URL</div>';
        return;
      }
      const { data, error } = await _sb.from('contracts')
        .select('*, bookings(event_name, event_date, venue_name, venue, fee, currency, promoter_id, artist_id, artists(stage_name, profiles(display_name)))')
        .eq('id', id)
        .single();
      if (error || !data) {
        document.getElementById('c-paper').innerHTML = `<div class="c-eyebrow">Contract not found</div>`;
        return;
      }
      _contract = data;
      renderContract(data);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { Auth.require(); return; }
      const navRoot = document.getElementById('nav-root');
      if (navRoot && typeof renderNav === 'function') {
        navRoot.innerHTML = renderNav('contracts');
      }
      if (typeof hydrateIcons === 'function') hydrateIcons();
      document.getElementById('c-sign-btn').addEventListener('click', handleSign);
      await loadContract();
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
