<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Bookings — ROSTR+</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://vgjmfpryobsuboukbemr.supabase.co" crossorigin>

  <link rel="stylesheet" href="assets/css/system.css?v=2521872">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/error-logger.js?v=2521872" defer></script>
  <script src="assets/js/app.js?v=2521872" defer></script>
  <style>
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: var(--space-2xl);
      padding-top: var(--space-2xl);
    }

    .page-header h1 { margin-bottom: 4px; }
    .page-header p { color: var(--text-secondary); font-size: 0.92rem; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }

    .filter-tabs {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .filter-tab {
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: var(--font-body);
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .filter-tab.active {
      background: var(--bg-raised);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .filter-tab:hover:not(.active) { color: var(--text-primary); }

    .filter-tab .count {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-left: 4px;
    }

    .filter-search {
      position: relative;
      margin-left: auto;
    }

    .filter-search input {
      padding: 8px 12px 8px 34px;
      width: 240px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      outline: none;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .filter-search input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
      width: 300px;
    }

    .filter-search input::placeholder { color: var(--text-tertiary); }

    .filter-search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    /* ── Booking cards ── */
    .bookings-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .booking-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 6px;
      transition: all var(--duration-base) var(--ease-out);
      animation: fadeIn 500ms var(--ease-out) both;
    }

    .booking-card:hover {
      border-color: var(--border-medium);
      box-shadow: var(--shadow-md);
    }

    .booking-inner {
      background: var(--bg-raised);
      border-radius: calc(var(--radius-lg) - 4px);
      padding: var(--space-lg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: var(--space-lg);
      align-items: center;
    }

    .booking-artist {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 200px;
    }

    .booking-artist-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .booking-artist-genre {
      font-size: 0.78rem;
      color: var(--text-tertiary);
    }

    .booking-details {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
      flex-wrap: wrap;
    }

    .booking-detail {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .booking-detail-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
    }

    .booking-detail-value {
      font-size: 0.88rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .booking-detail-value.amount {
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
      color: var(--gold-text);
    }

    .booking-actions {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-shrink: 0;
    }

    /* ── Row kebab menu ── */
    .row-kebab-wrap { position: relative; }
    .row-kebab-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: transparent; border: 1px solid var(--border-subtle);
      color: var(--text-tertiary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .row-kebab-btn:hover { background: var(--bg-card); color: var(--text-primary); border-color: var(--border-medium); }
    .row-kebab-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      min-width: 180px; padding: 6px;
      background: var(--bg-raised); border: 1px solid var(--border-medium);
      border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
      z-index: 50; display: none;
      animation: kebabIn 120ms ease-out;
    }
    .row-kebab-menu.open { display: block; }
    @keyframes kebabIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .row-kebab-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 8px 12px;
      background: none; border: none; text-align: left;
      font-size: 0.85rem; color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer; text-decoration: none;
    }
    .row-kebab-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .row-kebab-item--danger { color: var(--status-cancelled); }
    .row-kebab-item--danger:hover { background: rgba(248, 113, 113, 0.08); color: var(--status-cancelled); }
    .row-kebab-sep { height: 1px; background: var(--border-subtle); margin: 4px 2px; }

    /* ── Status indicator line ── */
    .booking-card[data-status="confirmed"] { border-left: 3px solid var(--status-confirmed); }
    .booking-card[data-status="pending"] { border-left: 3px solid var(--status-pending); }
    .booking-card[data-status="cancelled"] { border-left: 3px solid var(--status-cancelled); }
    .booking-card[data-status="draft"] { border-left: 3px solid var(--text-tertiary); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-4xl) var(--space-xl);
    }

    .empty-state h3 { color: var(--text-secondary); margin-bottom: var(--space-sm); }
    .empty-state p { color: var(--text-tertiary); max-width: 40ch; margin: 0 auto var(--space-lg); }

    /* ── Detail Modal ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    .detail-item label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .detail-item span {
      font-size: 0.92rem;
      color: var(--text-primary);
    }

    .detail-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: var(--space-lg) 0;
    }

    .detail-timeline {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      font-size: 0.85rem;
    }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .timeline-time {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .booking-inner {
        grid-template-columns: 1fr;
        gap: var(--space-md);
      }
      .booking-actions { justify-content: flex-end; }
    }

    @media (max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-search { margin-left: 0; }
      .filter-search input { width: 100%; }
      .filter-search input:focus { width: 100%; }
      .booking-details { gap: var(--space-md); }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <a id="main-content" tabindex="-1" class="sr-only">Main content</a>
  <div class="page-shell">
    <div class="container">

      <div class="page-header animate-in">
        <div>
          <h1>Bookings</h1>
          <p>Manage all your artist bookings in one place</p>
        </div>
        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap">
          <button class="btn btn-secondary" id="exportCsvBtn" onclick="exportCsv()" title="Export current view as CSV">
            <span class="js-icon" data-icon="download" data-size="14"></span>
            Export CSV
          </button>
          <a href="booking.html" class="btn btn-primary" id="newBookingBtn">New Booking</a>
        </div>
      </div>

      <!-- Stats summary -->
      <div class="stats-grid animate-in stagger-1" id="statsGrid"></div>

      <!-- Filter bar -->
      <div class="filter-bar animate-in stagger-2">
        <div class="filter-tabs" id="filterTabs"></div>
        <div class="filter-search">
          <div class="filter-search-icon" id="searchIcon"></div>
          <input type="text" placeholder="Search artist, venue..." id="searchInput" oninput="applyFilters()">
        </div>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-secondary);cursor:pointer;white-space:nowrap;padding:0 var(--space-sm)">
          <input type="checkbox" id="showHidden" onchange="reloadBookings()" style="accent-color:var(--accent);cursor:pointer">
          Show hidden
        </label>
      </div>

      <!-- Bookings list -->
      <div class="bookings-list" id="bookingsList"></div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3 id="modalTitle">Booking Details</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal()" id="modalClose" aria-label="Close dialog"></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // ── State ──
    let allBookings = [];
    let activeFilter = 'all';

    // ── Render stats ──
    function renderStats() {
      const confirmed = allBookings.filter(b => b.status === 'confirmed').length;
      const pending = allBookings.filter(b => b.status === 'pending').length;
      const totalSpend = allBookings.filter(b => b.status !== 'cancelled').reduce((s, b) => s + b.amount, 0);

      document.getElementById('statsGrid').innerHTML = `
        <div class="card stat-card"><div class="card-inner">
          <div class="stat-label">Total bookings</div>
          <div class="stat-value">${allBookings.length}</div>
        </div></div>
        <div class="card stat-card"><div class="card-inner">
          <div class="stat-label">Confirmed</div>
          <div class="stat-value" style="color:var(--status-confirmed)">${confirmed}</div>
        </div></div>
        <div class="card stat-card"><div class="card-inner">
          <div class="stat-label">Pending</div>
          <div class="stat-value" style="color:var(--status-pending)">${pending}</div>
        </div></div>
        <div class="card stat-card"><div class="card-inner">
          <div class="stat-label">Total value</div>
          <div class="stat-value" style="font-variant-numeric:tabular-nums">${UI.currency(totalSpend, 'AED')}</div>
        </div></div>
      `;
    }

    // ── Render filter tabs ──
    function renderFilterTabs() {
      const counts = {
        all: allBookings.length,
        confirmed: allBookings.filter(b => b.status === 'confirmed').length,
        pending: allBookings.filter(b => b.status === 'pending').length,
        draft: allBookings.filter(b => b.status === 'draft').length,
        cancelled: allBookings.filter(b => b.status === 'cancelled').length,
      };

      document.getElementById('filterTabs').innerHTML = Object.entries(counts).map(([key, count]) =>
        `<button class="filter-tab ${activeFilter === key ? 'active' : ''}" onclick="setFilter('${key}')">${key.charAt(0).toUpperCase() + key.slice(1)}<span class="count">${count}</span></button>`
      ).join('');
    }

    function setFilter(filter) {
      activeFilter = filter;
      renderFilterTabs();
      applyFilters();
    }

    // ── Apply filters ──
    // Returns the currently-filtered booking set so exportCsv() can reuse
    // the same logic without re-implementing it. Also renders.
    function currentlyFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allBookings;

      if (activeFilter !== 'all') {
        filtered = filtered.filter(b => b.status === activeFilter);
      }

      if (search) {
        filtered = filtered.filter(b =>
          (b.artist_name || '').toLowerCase().includes(search) ||
          (b.venue || '').toLowerCase().includes(search) ||
          (b.city || '').toLowerCase().includes(search) ||
          (b.genre || '').toLowerCase().includes(search)
        );
      }
      return filtered;
    }

    function applyFilters() {
      renderBookings(currentlyFiltered());
    }

    // Export whatever the user has filtered down to. Respects status tab,
    // search box, and the "show hidden" toggle. Filename includes the
    // active filter + today's date for unambiguous archiving.
    function exportCsv() {
      const rows = currentlyFiltered();
      if (rows.length === 0) { UI.toast('Nothing to export', 'info'); return; }
      const mapped = rows.map(b => ({
        booking_id:  b.id,
        date:        b.date || '',
        time:        b.time || '',
        artist:      b.artist_name || '',
        genre:       b.genre || '',
        venue:       b.venue || '',
        city:        b.city || '',
        status:      b.status || '',
        fee:         (b.amount != null) ? b.amount : '',
        currency:    b.currency || '',
        contract:    b.contract || '',
        hidden:      b.hidden ? 'yes' : 'no',
        created_at:  b.created || '',
      }));
      const today = new Date().toISOString().slice(0, 10);
      const label = activeFilter === 'all' ? 'bookings' : `bookings-${activeFilter}`;
      UI.downloadCSV(`rostr-${label}-${today}.csv`, mapped);
    }

    // Build the kebab menu for a booking row. Returns self-contained HTML:
    // a button and the menu itself. Open/close is managed by toggleKebab().
    // Items vary with status + hidden state; never includes Open (it's the
    // primary action rendered beside the kebab).
    function rowKebab(b) {
      const items = [];
      if (b.status === 'draft') {
        items.push(`<a class="row-kebab-item" href="booking.html?artist=${b.artist_id}">${UI.icon('fileText', 14)} Edit draft</a>`);
      }
      items.push(`<a class="row-kebab-item" href="messages.html?booking=${b.id}">${UI.icon('inbox', 14)} Open messages</a>`);
      if (['confirmed', 'contracted'].includes(b.status)) {
        items.push(`<a class="row-kebab-item" href="contracts.html">${UI.icon('fileText', 14)} Go to contracts</a>`);
      }
      items.push(`<button class="row-kebab-item" onclick="copyBookingLink('${b.id}')">${UI.icon('copy', 14)} Copy booking link</button>`);
      items.push(`<button class="row-kebab-item" onclick="exportSingleBooking('${b.id}')">${UI.icon('download', 14)} Export this booking (CSV)</button>`);
      items.push(`<div class="row-kebab-sep"></div>`);
      if (b.hidden) {
        items.push(`<button class="row-kebab-item" onclick="toggleHideBooking('${b.id}', false); closeAllKebabs();">${UI.icon('eye', 14)} Unhide</button>`);
      } else {
        items.push(`<button class="row-kebab-item" onclick="toggleHideBooking('${b.id}', true); closeAllKebabs();">${UI.icon('eyeOff', 14)} Hide from my list</button>`);
      }
      if (['inquiry', 'pending', 'draft', 'confirmed'].includes(b.status)) {
        items.push(`<button class="row-kebab-item row-kebab-item--danger" onclick="cancelBooking('${b.id}'); closeAllKebabs();">${UI.icon('trash', 14)} Cancel booking</button>`);
      }
      return `
        <div class="row-kebab-wrap">
          <button class="row-kebab-btn" aria-label="Row actions" onclick="toggleKebab(event, '${b.id}')">${UI.icon('moreVertical', 18)}</button>
          <div class="row-kebab-menu" id="kebab-${b.id}" role="menu">${items.join('')}</div>
        </div>
      `;
    }

    function toggleKebab(ev, id) {
      ev.stopPropagation();
      const menu = document.getElementById(`kebab-${id}`);
      if (!menu) return;
      const wasOpen = menu.classList.contains('open');
      closeAllKebabs();
      if (!wasOpen) menu.classList.add('open');
    }

    function closeAllKebabs() {
      document.querySelectorAll('.row-kebab-menu.open').forEach(m => m.classList.remove('open'));
    }

    // Close on outside-click + Escape — registered once at module load
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.row-kebab-wrap')) closeAllKebabs();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAllKebabs();
    });

    // Handlers for menu items that aren't already globally defined
    async function copyBookingLink(id) {
      const url = `${location.origin}/booking-detail.html?id=${id}`;
      try {
        await navigator.clipboard.writeText(url);
        UI.toast('Link copied', 'success');
      } catch (_) {
        UI.toast('Copy failed \u2014 long-press to copy the URL', 'error');
      }
    }

    function exportSingleBooking(id) {
      const b = allBookings.find(x => x.id === id);
      if (!b) { UI.toast('Booking not found', 'error'); return; }
      UI.downloadCSV(`rostr-booking-${id.slice(0, 8)}.csv`, [{
        booking_id:  b.id,
        date:        b.date || '',
        time:        b.time || '',
        artist:      b.artist_name || '',
        genre:       b.genre || '',
        venue:       b.venue || '',
        city:        b.city || '',
        status:      b.status || '',
        fee:         b.amount != null ? b.amount : '',
        currency:    b.currency || '',
        contract:    b.contract || '',
        created_at:  b.created || '',
      }]);
    }

    // ── Render bookings ──
    function renderBookings(bookings) {
      const list = document.getElementById('bookingsList');

      if (bookings.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div style="color:var(--text-tertiary);opacity:0.2;margin-bottom:var(--space-md)"><span class="js-icon" data-icon="calendar" data-size="48"></span></div>
            <h3>No bookings found</h3>
            <p>Try adjusting your filters or create a new booking.</p>
            <a href="booking.html" class="btn btn-primary">New Booking</a>
          </div>
        `;
        return;
      }

      // Sort by date descending
      const sorted = [...bookings].sort((a, b) => new Date(b.date) - new Date(a.date));

      list.innerHTML = sorted.map((b, i) => {
        const artist = null;
        const isPast = new Date(b.date) < new Date();

        return `
        <div class="booking-card" data-status="${b.status}" style="animation-delay:${i * 60}ms;${b.hidden ? 'opacity:0.6' : ''}">
          <div class="booking-inner">
            <div class="booking-artist">
              ${UI.avatar(b.artist_name, 44)}
              <div>
                <div class="booking-artist-name">${esc(b.artist_name)}${b.hidden ? ' <span style="font-size:0.68rem;font-weight:500;color:var(--text-tertiary);background:var(--bg-card);border:1px solid var(--border-subtle);padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle">Hidden</span>' : ''}</div>
                <div class="booking-artist-genre">${esc(b.genre)}</div>
              </div>
            </div>

            <div class="booking-details">
              <div class="booking-detail">
                <span class="booking-detail-label">Date</span>
                <span class="booking-detail-value">${UI.formatDate(b.date)}</span>
              </div>
              <div class="booking-detail">
                <span class="booking-detail-label">Time</span>
                <span class="booking-detail-value">${esc(b.time)}</span>
              </div>
              <div class="booking-detail">
                <span class="booking-detail-label">Venue</span>
                <span class="booking-detail-value">${esc(b.venue)}</span>
              </div>
              <div class="booking-detail">
                <span class="booking-detail-label">City</span>
                <span class="booking-detail-value">${esc(b.city)}</span>
              </div>
              <div class="booking-detail">
                <span class="booking-detail-label">Fee</span>
                <span class="booking-detail-value amount">${UI.currency(b.amount, b.currency)}</span>
              </div>
              <div class="booking-detail">
                <span class="booking-detail-label">Status</span>
                ${UI.statusTag(b.status)}
              </div>
            </div>

            <div class="booking-actions">
              <a href="booking-detail.html?id=${b.id}" class="btn btn-primary btn-sm">Open</a>
              ${rowKebab(b)}
            </div>
          </div>
        </div>
      `;}).join('');
    }

    // ── View booking detail ──
    function viewBooking(id) {
      const b = allBookings.find(x => x.id === id);
      if (!b) return;

      const platformFee = Math.round(b.amount * 0.05);
      const total = b.amount + platformFee;

      document.getElementById('modalTitle').textContent = b.artist_name + ' — ' + b.venue;
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-grid">
          <div class="detail-item">
            <label>Artist</label>
            <span>${esc(b.artist_name)}</span>
          </div>
          <div class="detail-item">
            <label>Genre</label>
            <span>${esc(b.genre)}</span>
          </div>
          <div class="detail-item">
            <label>Venue</label>
            <span>${esc(b.venue)}, ${esc(b.city)}</span>
          </div>
          <div class="detail-item">
            <label>Date & Time</label>
            <span>${UI.formatDate(b.date)} at ${esc(b.time)}</span>
          </div>
          <div class="detail-item">
            <label>Duration</label>
            <span>${esc(b.duration)}</span>
          </div>
          <div class="detail-item">
            <label>Status</label>
            <span>${UI.statusTag(b.status)}</span>
          </div>
          <div class="detail-item">
            <label>Contract</label>
            <span>${UI.statusTag(b.contract)}</span>
          </div>
          <div class="detail-item">
            <label>Booking ID</label>
            <span style="font-family:var(--font-mono);font-size:0.82rem;color:var(--text-tertiary)">${b.id.toUpperCase()}</span>
          </div>
        </div>

        <div class="detail-divider"></div>

        <h4 style="margin-bottom:var(--space-md);font-size:0.95rem">Payment Breakdown</h4>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:var(--space-lg)">
          <div style="display:flex;justify-content:space-between;font-size:0.88rem">
            <span class="text-secondary">Artist fee</span>
            <span style="font-variant-numeric:tabular-nums">${UI.currency(b.amount, b.currency)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:0.88rem">
            <span class="text-secondary">Platform fee (5%)</span>
            <span style="font-variant-numeric:tabular-nums">${UI.currency(platformFee, b.currency)}</span>
          </div>
          <div style="height:1px;background:var(--border-subtle)"></div>
          <div style="display:flex;justify-content:space-between;font-size:0.95rem;font-weight:600">
            <span>Total</span>
            <span style="color:var(--gold-text);font-variant-numeric:tabular-nums">${UI.currency(total, b.currency)}</span>
          </div>
        </div>

        <div class="detail-divider"></div>

        <h4 style="margin-bottom:var(--space-md);font-size:0.95rem">Activity</h4>
        <!-- Timeline is populated asynchronously from public.booking_events
             (the table the iOS app's TimelineStore listens to). Falls back
             to "Booking created" if the table has nothing for this booking
             yet. -->
        <div class="detail-timeline" id="bookingTimeline">
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div>
              <div>Booking created</div>
              <div class="timeline-time">${UI.formatDate(b.created)}</div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-xl)">
          ${b.status === 'confirmed' || b.status === 'pending' ? `<a href="messages.html" class="btn btn-secondary">Message Artist</a>` : ''}
          ${b.contract !== 'none' ? `<a href="contracts.html" class="btn btn-secondary">View Contract</a>` : ''}
          <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        </div>
      `;

      document.getElementById('detailModal').classList.add('active');

      // Asynchronously upgrade the timeline with live booking_events.
      // The trigger on public.bookings INSERTs an event on every
      // status transition; iOS reads + subscribes to the same table
      // via TimelineStore.
      loadBookingTimeline(b.id).catch(err => console.warn('[bookings] timeline load failed', err));

      // Live updates while the modal is open — re-load the timeline
      // whenever a new booking_event lands. Cheap (full re-fetch is
      // ~10 rows) and avoids fragile incremental DOM patching.
      _activeTimelineUnsub = Realtime.subscribeToBookingEvents(b.id, () => {
        loadBookingTimeline(b.id).catch(() => {});
      });
    }
    let _activeTimelineUnsub = null;

    /// Fetches public.booking_events scoped to this booking, oldest
    /// first, and re-renders the timeline list with proper labels +
    /// status-coloured dots.
    async function loadBookingTimeline(bookingId) {
      if (DEMO_MODE || !_sb) return;
      const { data, error } = await _sb
        .from('booking_events')
        .select('id, kind, label, created_at')
        .eq('booking_id', bookingId)
        .order('created_at', { ascending: true });
      if (error || !Array.isArray(data) || data.length === 0) return;

      const dotColor = {
        'request_sent':            'var(--text-tertiary)',
        'artist_accepted':         'var(--status-confirmed)',
        'artist_declined':         'var(--status-cancelled)',
        'contract_drafted':        'var(--status-pending)',
        'contract_signed_artist':  'var(--status-pending)',
        'contract_signed_promoter':'var(--status-pending)',
        'contract_countersigned':  'var(--status-confirmed)',
        'payment_scheduled':       'var(--status-pending)',
        'payment_recorded':        'var(--status-confirmed)',
        'payment_confirmed':       'var(--status-confirmed)',
        'event_completed':         'var(--status-confirmed)',
        'event_cancelled':         'var(--status-cancelled)',
        'review_submitted':        'var(--status-pending)',
        'note':                    'var(--text-tertiary)',
      };

      const fallbackLabel = {
        'request_sent':            'Booking request sent',
        'artist_accepted':         'Artist accepted',
        'artist_declined':         'Artist declined',
        'contract_drafted':        'Contract drafted',
        'contract_signed_artist':  'Artist signed',
        'contract_signed_promoter':'Promoter signed',
        'contract_countersigned':  'Contract countersigned',
        'payment_scheduled':       'Payment scheduled',
        'payment_recorded':        'Payment recorded',
        'payment_confirmed':       'Payment confirmed',
        'event_completed':         'Performance completed',
        'event_cancelled':         'Booking cancelled',
        'review_submitted':        'Review submitted',
        'note':                    'Note',
      };

      const html = data.map(ev => {
        const label = ev.label || fallbackLabel[ev.kind] || 'Update';
        const color = dotColor[ev.kind] || 'var(--text-tertiary)';
        const when  = UI.formatDate(ev.created_at);
        return `<div class="timeline-item">
          <div class="timeline-dot" style="background:${color}"></div>
          <div>
            <div>${esc(label)}</div>
            <div class="timeline-time">${when}</div>
          </div>
        </div>`;
      }).join('');

      const el = document.getElementById('bookingTimeline');
      if (el) el.innerHTML = html;
    }

    async function cancelBooking(id) {
      const b = allBookings.find(x => x.id === id);
      if (!b || !confirm('Cancel booking for ' + (b.artist_name || 'this artist') + '?')) return;
      const result = await DB.updateBookingStatus(id, 'cancelled');
      if (result.success) {
        b.status = 'cancelled';
        renderStats();
        renderFilterTabs();
        applyFilters();
        UI.toast('Booking cancelled', 'warning');
      } else {
        UI.toast('Failed to cancel booking', 'error');
      }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      // Tear the timeline channel down so we don't leak sockets.
      if (_activeTimelineUnsub) {
        try { _activeTimelineUnsub(); } catch (_) {}
        _activeTimelineUnsub = null;
      }
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { window.location.href = 'auth.html'; return; }
      // Promoter-only list; artists see their bookings on artist-dashboard under "Requests" / "Upcoming"
      if (Auth.role === 'artist') { window.location.replace('artist-dashboard.html'); return; }

      document.getElementById('nav-root').innerHTML = renderNav('bookings');
      document.getElementById('searchIcon').innerHTML = UI.icon('search', 14);
      document.getElementById('newBookingBtn').innerHTML = UI.icon('plus', 16) + ' New Booking';
      document.getElementById('modalClose').innerHTML = UI.icon('x', 18);

      await reloadBookings();
    });

    async function reloadBookings() {
      const includeHidden = !!document.getElementById('showHidden')?.checked;
      const result = await DB.getMyBookings({ includeHidden });
      if (result.success) {
        allBookings = result.data.map(b => ({
          id: b.id,
          artist_id: b.artist_id,
          artist_name: b.artist_name || b.artists?.profiles?.display_name || b.artists?.stage_name || 'Unknown Artist',
          genre: b.genre || (Array.isArray(b.artists?.genre) ? b.artists.genre[0] : b.artists?.genre) || '',
          venue: b.venue || b.venue_name || '',
          city: b.city || (Array.isArray(b.artists?.cities_active) ? b.artists.cities_active[0] : '') || '',
          date: b.date || b.event_date,
          time: b.time || b.event_time || '',
          duration: b.duration || '',
          status: b.status,
          amount: b.amount || b.fee || 0,
          currency: b.currency || 'AED',
          created: b.created_at,
          contract: b.contracts?.[0]?.status || 'none',
          hidden: !!b.hidden_by_promoter,
        }));
      }
      renderStats();
      renderFilterTabs();
      applyFilters();
    }

    async function toggleHideBooking(id, hide) {
      const verb = hide ? 'Hide this booking from your list?' : 'Unhide this booking?';
      if (hide && !confirm(verb)) return;
      const res = await DB.hideBooking(id, hide);
      if (!res.success) { UI.toast(res.error || 'Could not update', 'error'); return; }
      UI.toast(hide ? 'Booking hidden' : 'Booking restored', 'success');
      await reloadBookings();
    }

    // Close modal on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
    <!-- Site-wide footer (rendered by app.js renderFooter()) -->
    <site-footer id="site-footer"></site-footer>
</body>
</html>
