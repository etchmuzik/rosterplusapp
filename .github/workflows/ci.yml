name: CI

# Fires on every push to main + every pull request that targets main.
# Runs the exact same pre-deploy checks scripts/deploy.sh runs locally:
#   1. node --check on all JS files
#   2. HTML well-formed check (every *.html closes </html>)
#   3. Playwright @smoke tests against a local static server
#
# If any step fails, the commit/PR gets a red X. Same gate as the
# manual FTP deploy on your machine — so a second contributor can't
# ship a typo that your deploy.sh would have caught.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: JS syntax check
        run: |
          node --check assets/js/app.js
          node --check assets/js/error-logger.js
          node --check sw.js

      - name: HTML well-formed check
        run: |
          set -e
          for f in *.html; do
            if ! grep -q '</html>' "$f"; then
              echo "::error file=$f::Missing closing </html> tag"
              exit 1
            fi
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          npx http-server . -p 8090 -c-1 -s >/tmp/server.log 2>&1 &
          # Give it a second to bind.
          sleep 2
          curl -sSf http://localhost:8090/ > /dev/null || {
            echo "::error::http-server failed to start"
            cat /tmp/server.log
            exit 1
          }

      - name: Run Playwright smoke tests
        run: npx playwright test --config=e2e/playwright.config.js --grep @smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/results.json
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Sitemap freshness check
        # Fails the build if sitemap.xml is stale relative to the verified
        # artist list. Forces contributor to run scripts/generate-sitemap.sh
        # before shipping new verified artists. Runs against the live
        # anon-key-readable artists table, so no secrets needed.
        run: |
          bash scripts/generate-sitemap.sh --check || {
            echo "::warning::sitemap.xml is stale. Run: bash scripts/generate-sitemap.sh"
            exit 0
          }
        continue-on-error: true

  visual:
    # Pixel-diff screenshot suite. Catches layout breakage Lighthouse
    # can't — missing hero card, invisible button, shifted form row.
    # Runs against Linux baselines committed under
    # e2e/tests/visual.spec.js-snapshots/ (platform suffix = chromium-linux).
    # Developers on macOS generate baselines locally with:
    #   npm run test:visual:update
    # Docker-based CI run is the source of truth.
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          npx http-server . -p 8090 -c-1 -s >/tmp/server.log 2>&1 &
          sleep 2
          curl -sSf http://localhost:8090/ > /dev/null || { cat /tmp/server.log; exit 1; }

      - name: Run visual regression
        run: npx playwright test --config=e2e/playwright.config.js --grep @visual

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    # Auto-deploys to Hostinger via lftp on every successful push to main.
    # Runs only after `checks` is green — a typo or broken JS that would
    # have failed scripts/deploy.sh's local pre-checks fails CI here too,
    # and the FTP step never runs.
    #
    # This closes the deploy gap that caused the 2026-04-30 EPK incident:
    # commits sat in `main` for 5 days because nobody ran scripts/deploy.sh.
    # Push-to-main is now the deploy trigger.
    #
    # When the Netlify DNS cutover happens, this job becomes redundant
    # (Netlify auto-deploys on push too). Until then, this is the bridge.
    #
    # Required GitHub Actions secrets (Settings → Secrets → Actions):
    #   FTP_HOST       — Hostinger FTP host (mirrors web/.env.deploy)
    #   FTP_USER       — FTP user
    #   FTP_PASSWORD   — FTP password
    #   FTP_REMOTE_DIR — remote root, usually "/" (Hostinger maps to public_html)
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    concurrency:
      # Serialize deploys — never run two in parallel against the same
      # FTP target. A second push that lands while one is in flight
      # waits, then runs against the latest commit.
      group: deploy-hostinger
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          # deploy-stamp.sh reads $COMMIT_REF for the SHA; checkout
          # action doesn't set that, so we let the script fall through
          # to `git rev-parse --short HEAD`. Need the full ref for that.
          fetch-depth: 1

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Stamp build SHA into sw.js / app.js / HTML asset refs
        # Reuses the same script Netlify would call on its build step.
        # Idempotent — safe to re-run if a deploy is rerun manually.
        run: bash scripts/deploy-stamp.sh

      - name: Build file list
        # Same find filter scripts/deploy.sh uses locally. We don't
        # exclude scripts/ from the local script (it's needed there for
        # bootstrap) but we DO exclude it here — Hostinger doesn't need
        # the deploy scripts on the live tree.
        id: files
        run: |
          set -euo pipefail
          find . \
            -type d \( \
              -name '.git' -o -name '.github' -o -name '.claude' -o \
              -name 'node_modules' -o -name 'scripts' -o -name 'supabase' -o -name 'e2e' -o \
              -name 'docs' -o -name 'test-results' -o -name 'testsprite_tests' \
            \) -prune -o \
            -type f \
            ! -name '.DS_Store' \
            ! -name '.env' ! -name '.env.*' \
            ! -name '.gitignore' \
            ! -name 'package.json' ! -name 'package-lock.json' \
            ! -name 'DEPLOY.md' ! -name 'README.md' \
            ! -name 'netlify.toml' ! -name 'serve.js' \
            ! -name 'supabase-schema.sql' ! -name '.mcp.json' \
            ! -name '*.deploy-bak' ! -name '*.tmp' \
            -print | sed 's|^\./||' | sort > /tmp/deploy-files.txt
          COUNT=$(wc -l < /tmp/deploy-files.txt | tr -d ' ')
          echo "Will upload $COUNT files"
          head -20 /tmp/deploy-files.txt
          echo "…"

      - name: Upload to Hostinger via lftp
        # Per-file `put -O` mirrors scripts/deploy.sh exactly. lftp's
        # `mirror --reverse` chokes on Hostinger's Arabic-locale FTP
        # timestamps and silently no-ops; per-file `put` sidesteps the
        # remote directory listing entirely.
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${FTP_HOST:?FTP_HOST secret missing}"
          : "${FTP_USER:?FTP_USER secret missing}"
          : "${FTP_PASSWORD:?FTP_PASSWORD secret missing}"
          : "${FTP_REMOTE_DIR:=/}"

          LFTP_SCRIPT=$(mktemp)
          {
            echo "set ssl:verify-certificate no"
            echo "set ftp:ssl-allow yes"
            echo "set ftp:passive-mode yes"
            echo "set net:max-retries 3"
            echo "set net:timeout 30"
            echo "set net:reconnect-interval-base 5"
            echo "set cmd:parallel 1"
            if [[ "$FTP_REMOTE_DIR" != "/" ]]; then
              echo "mkdir -p $FTP_REMOTE_DIR"
            fi
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              remote_dir=$(dirname "$f")
              if [[ "$remote_dir" == "." ]]; then
                remote_path="./"
              else
                remote_path="$remote_dir/"
              fi
              printf 'put -O "%s" "%s"\n' "$remote_path" "$f"
            done < /tmp/deploy-files.txt
            echo "bye"
          } > "$LFTP_SCRIPT"

          # Don't echo passwords. lftp's -u is masked from the run log
          # by GitHub's secret scrubber as long as FTP_PASSWORD is a
          # registered secret.
          lftp -u "$FTP_USER","$FTP_PASSWORD" "ftp://$FTP_HOST" < "$LFTP_SCRIPT"

      - name: Verify live deploy
        # Hit the homepage and confirm the SHA stamped a few minutes ago
        # is actually live. Catches CDN cache misses and wrong-target
        # uploads.
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA:0:7}"
          # Hostinger has a CDN edge cache; give it a moment to flush.
          sleep 5
          # Query the live page and confirm window.ROSTR_VERSION matches
          # the commit we just deployed. -L follows redirects.
          if curl -sL https://rosterplus.io/ | grep -qF "ROSTR_VERSION = '$SHA'"; then
            echo "✓ Live homepage shows ROSTR_VERSION=$SHA"
          else
            echo "::warning::ROSTR_VERSION mismatch — CDN may be stale or upload failed"
            echo "Expected: $SHA"
            echo "Live response (first 500 chars):"
            curl -sL https://rosterplus.io/ | head -c 500
            # Don't fail the job on this — Hostinger's edge can take
            # minutes to flush. The upload itself succeeded by this
            # point. Make it a warning, surface it for ops.
          fi

  lighthouse:
    # Runs separately so a flaky perf blip doesn't block a functional
    # deploy. Reports scores as a comment on the PR — thresholds
    # advisory, not gating, until we stabilize a budget.
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start static server
        run: |
          npx http-server . -p 8090 -c-1 -s >/tmp/server.log 2>&1 &
          sleep 2

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8090/index.html
            http://localhost:8090/directory.html
            http://localhost:8090/auth.html
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
