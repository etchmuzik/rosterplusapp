<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Artist Directory | ROSTR+ GCC</title>
  <meta name="description" content="Browse the GCC's top DJs and live acts. Filter by genre, city, and availability. Request a booking in seconds on ROSTR+.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ROSTR+ GCC">
  <meta property="og:title" content="Artist Directory — ROSTR+ GCC">
  <meta property="og:description" content="Browse the GCC's top DJs and live acts. Filter by genre, city, and availability.">
  <meta property="og:image" content="https://rosterplus.io/icons/og-default.png">
  <meta property="og:url" content="https://rosterplus.io/directory.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Artist Directory — ROSTR+ GCC">
  <meta name="twitter:description" content="Browse the GCC's top DJs and live acts. Filter by genre, city, and availability.">
  <meta name="twitter:image" content="https://rosterplus.io/icons/og-default.png">

  <link rel="stylesheet" href="assets/css/system.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main class="container" style="padding: var(--space-xl) 0 var(--space-3xl)">
      <div class="dir-header lp-anim">
        <span class="eyebrow" style="font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); display: block; margin-bottom: 8px">
          Roster · <span id="dir-count-hero">—</span> verified artists
        </span>
        <h1 style="font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.03em; line-height: 1.05">
          The roster.
        </h1>
        <p style="margin-top: 8px; color: var(--text-secondary); max-width: 60ch; font-size: 1rem">
          Every DJ, live act, and headliner we'd put our name behind. Filter, shortlist, book.
        </p>
      </div>

      <div class="dir-toolbar">
        <div class="dir-search">
          <span class="js-icon" data-icon="search" data-size="16"></span>
          <input type="text" class="dir-input" id="searchInput" placeholder="Search artists, genres…" autocomplete="off">
        </div>
        <select class="dir-select" id="genreFilter" style="min-width: 160px">
          <option value="">All genres</option>
          <option>House</option>
          <option>Tech House</option>
          <option>Deep House</option>
          <option>Afro House</option>
          <option>Melodic House</option>
          <option>Melodic Techno</option>
          <option>Progressive</option>
          <option>Tribal</option>
          <option>Open Format</option>
          <option>Electronic</option>
        </select>
        <select class="dir-select" id="cityFilter" style="min-width: 150px">
          <option value="">All cities</option>
          <option>Dubai</option>
          <option>Abu Dhabi</option>
          <option>Riyadh</option>
          <option>Jeddah</option>
          <option>Doha</option>
          <option>Kuwait City</option>
          <option>Bahrain</option>
          <option>Muscat</option>
          <option>Cairo</option>
          <option>Hurghada</option>
          <option>Tashkent</option>
        </select>
        <select class="dir-select" id="rateFilter" style="min-width: 130px">
          <option value="">Any rate</option>
          <option value="low">Under 10K</option>
          <option value="mid">10K – 25K</option>
          <option value="high">25K+</option>
        </select>
        <input type="date" class="dir-select" id="dateFilter" title="Check availability on date" style="min-width: 160px">
        <label style="display: inline-flex; align-items: center; gap: 8px; padding: 0 10px; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer">
          <input type="checkbox" id="availabilityToggle" style="accent-color: var(--accent)">
          Available only
        </label>
        <div class="dir-view-toggle" role="tablist" aria-label="View mode">
          <button id="view-grid" class="active" aria-label="Grid view" title="Grid">
            <span class="js-icon" data-icon="grid" data-size="14"></span>
          </button>
          <button id="view-list" aria-label="List view" title="List">
            <span class="js-icon" data-icon="menu" data-size="14"></span>
          </button>
        </div>
      </div>

      <div class="dir-meta" id="resultsInfo">Loading artists…</div>

      <div id="artist-grid" class="dir-grid"></div>
      <div id="artist-list" class="dir-list" style="display: none"></div>
      <div id="empty-state" class="dir-empty" style="display: none">
        <h3 style="margin-bottom: 8px">No artists match your filters</h3>
        <p style="color: var(--text-tertiary); font-size: 0.9rem">Try clearing filters or broadening your search.</p>
      </div>
    </main>
  </div>

  <script>
    let allArtists = [];
    let filteredArtists = [];
    let viewMode = 'grid';

    /* Deterministic tinted-gradient cover from the artist's name.
       Stand-in for real artist photos until artists upload their own. */
    function coverStyle(name) {
      const hash = (name || '').split('').reduce((h, c) => h + c.charCodeAt(0), 0);
      const hue = hash % 360;
      return `background: radial-gradient(ellipse 70% 60% at 30% 30%, hsla(${hue}, 22%, 45%, 0.6) 0%, transparent 60%),
                          linear-gradient(180deg, var(--bg-3), var(--bg-base));`;
    }

    function initials(name) {
      return (name || '?')
        .split(/\s+/)
        .map(w => w[0])
        .filter(Boolean)
        .slice(0, 2)
        .join('')
        .toUpperCase();
    }

    function renderGrid() {
      const g = document.getElementById('artist-grid');
      g.innerHTML = filteredArtists.map((a, i) => {
        const name = a.name || a.stage_name || 'Artist';
        const genre = a.genre || '';
        const city = a.city || '—';
        const avail = a.available === false ? 'booked' : 'avail';
        const availLabel = avail === 'avail' ? 'Free' : 'Booked';
        const initialsHtml = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:3rem;letter-spacing:-0.04em;color:rgba(255,255,255,0.18);z-index:1">${esc(initials(name))}</div>`;

        return `
          <div class="artist-card lp-anim lp-d-${(i % 5) + 1}" onclick="window.location.href='profile.html?id=${esc(a.id)}'">
            <div class="cover" style="${coverStyle(name)}"></div>
            ${initialsHtml}
            <div class="artist-card-content">
              <div class="artist-card-top">
                <div class="availability-dot ${avail}">
                  ${avail === 'avail' ? '<span class="pulse-dot"></span>' : ''}
                  ${availLabel}
                </div>
                ${a.verified ? `<div class="artist-card-verified">${UI.icon('check', 11)}</div>` : ''}
              </div>
              <div class="artist-card-bot">
                ${genre ? `<div class="artist-card-genre">${esc(genre)}</div>` : ''}
                <div class="artist-card-name">${esc(name)}</div>
                <div class="artist-card-meta">
                  <span style="display:inline-flex;align-items:center;gap:4px">${UI.icon('mapPin', 10)} ${esc(city)}</span>
                  <span class="dot"></span>
                  <span>On request</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderList() {
      const l = document.getElementById('artist-list');
      l.innerHTML = filteredArtists.map(a => {
        const name = a.name || a.stage_name || 'Artist';
        const genre = a.genre || '';
        const city = a.city || '—';
        const avail = a.available === false ? 'booked' : 'avail';
        const availLabel = avail === 'avail' ? 'Free' : 'Booked';
        return `
          <div class="dir-list-row" onclick="window.location.href='profile.html?id=${esc(a.id)}'">
            <div class="dir-list-thumb" style="${coverStyle(name)}">${esc(initials(name))}</div>
            <div>
              <div class="dir-list-name">
                ${esc(name)}
                ${a.verified ? `<span class="verified-badge">${UI.icon('check', 12)}</span>` : ''}
              </div>
              <div class="dir-list-sub">${esc(genre)}</div>
            </div>
            <div class="dir-list-cell">${UI.icon('mapPin', 11)} ${esc(city)}</div>
            <div class="dir-list-cell mono">On request</div>
            <div class="availability-dot ${avail}">${availLabel}</div>
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); window.location.href='booking.html?artist=${esc(a.id)}'">Book</button>
          </div>
        `;
      }).join('');
    }

    function render() {
      const count = filteredArtists.length;
      document.getElementById('resultsInfo').textContent =
        count + ' artist' + (count === 1 ? '' : 's') + ' · sorted by relevance';

      const empty = count === 0;
      document.getElementById('empty-state').style.display = empty ? 'block' : 'none';
      document.getElementById('artist-grid').style.display = !empty && viewMode === 'grid' ? 'grid' : 'none';
      document.getElementById('artist-list').style.display = !empty && viewMode === 'list' ? 'block' : 'none';

      if (empty) return;
      if (viewMode === 'grid') renderGrid();
      else renderList();
    }

    function applyFilters() {
      const q        = document.getElementById('searchInput').value.trim().toLowerCase();
      const genre    = document.getElementById('genreFilter').value;
      const city     = document.getElementById('cityFilter').value;
      const rate     = document.getElementById('rateFilter').value;
      const date     = document.getElementById('dateFilter').value;
      const availOnly= document.getElementById('availabilityToggle').checked;

      filteredArtists = allArtists.filter(a => {
        const name = (a.name || a.stage_name || '').toLowerCase();
        const aGenre = (a.genre || '').toLowerCase();
        if (q && !name.includes(q) && !aGenre.includes(q)) return false;
        if (genre && aGenre !== genre.toLowerCase()) return false;
        if (city && (a.city || '').toLowerCase() !== city.toLowerCase()) return false;
        if (availOnly && a.available === false) return false;
        if (rate) {
          const fee = a.rate_min || a.rateMin || 0;
          if (rate === 'low'  && fee >= 10000) return false;
          if (rate === 'mid'  && (fee < 10000 || fee >= 25000)) return false;
          if (rate === 'high' && fee < 25000) return false;
        }
        if (date && Array.isArray(a.blocked_dates) && a.blocked_dates.includes(date)) return false;
        return true;
      });
      render();
    }

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', applyFilters);
      document.getElementById('genreFilter').addEventListener('change', applyFilters);
      document.getElementById('cityFilter').addEventListener('change', applyFilters);
      document.getElementById('rateFilter').addEventListener('change', applyFilters);
      document.getElementById('dateFilter').addEventListener('change', applyFilters);
      document.getElementById('availabilityToggle').addEventListener('change', applyFilters);

      document.getElementById('view-grid').addEventListener('click', () => {
        viewMode = 'grid';
        document.getElementById('view-grid').classList.add('active');
        document.getElementById('view-list').classList.remove('active');
        render();
      });
      document.getElementById('view-list').addEventListener('click', () => {
        viewMode = 'list';
        document.getElementById('view-list').classList.add('active');
        document.getElementById('view-grid').classList.remove('active');
        render();
      });
    }

    async function initializeDirectory() {
      const res = await DB.getArtists();
      allArtists = (res.success && res.data) ? res.data : [];
      filteredArtists = [...allArtists];
      const countEl = document.getElementById('dir-count-hero');
      if (countEl) countEl.textContent = allArtists.length > 0 ? allArtists.length + '+' : '—';
      render();
      if (!res.success) {
        document.getElementById('resultsInfo').textContent = "Couldn't load artists — please refresh.";
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof Auth !== 'undefined') {
        await Auth.ready();
        if (Auth.isLoggedIn() && Auth.role === 'artist') {
          window.location.replace('artist-dashboard.html');
          return;
        }
      }
      const navRoot = document.getElementById('nav-root');
      if (navRoot && typeof renderNav === 'function') {
        navRoot.innerHTML = renderNav('directory');
      }
      if (typeof hydrateIcons === 'function') hydrateIcons();
      setupEventListeners();
      initializeDirectory();
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
