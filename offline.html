<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>You're offline — ROSTR+ GCC</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/assets/css/system.css">
  <style>
    .offline-main {
      max-width: 560px;
      margin: 20vh auto 0;
      padding: 0 var(--space-lg);
      text-align: center;
    }
    .offline-pulse {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--border-medium);
      margin: 0 auto var(--space-xl);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      animation: pulse 2.4s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { border-color: var(--border-medium); color: var(--text-tertiary); }
      50%      { border-color: var(--accent); color: var(--accent-soft); }
    }
    .offline-actions {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
      flex-wrap: wrap;
      margin-top: var(--space-xl);
    }
  </style>
</head>
<body>
  <main class="offline-main">
    <div class="offline-pulse" aria-hidden="true">off</div>
    <div class="eyebrow" style="font-family:var(--font-mono);font-size:0.78rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-sm)">
      Connection lost
    </div>
    <h1 style="font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);letter-spacing:-0.04em;line-height:1.1;margin-bottom:var(--space-md)">
      You're offline.
    </h1>
    <p style="color:var(--text-secondary);font-size:1.02rem;max-width:48ch;margin:0 auto var(--space-md);line-height:1.6">
      This page isn't cached yet. Reconnect and we'll pick up where you left off — dashboards you've visited before still work offline.
    </p>
    <p style="color:var(--text-tertiary);font-size:0.85rem;font-family:var(--font-mono)">
      Last seen online: <span id="last-online">—</span>
    </p>
    <div class="offline-actions">
      <button class="btn btn-primary" onclick="location.reload()">Retry connection</button>
      <a class="btn btn-secondary" href="/">Back to home</a>
    </div>
  </main>
  <script>
    // Show when we last had a real network. Helps users figure out if
    // it's their wifi (just now) or a bigger outage (hours ago).
    (function () {
      try {
        const when = Number(localStorage.getItem('rostr_last_online') || 0);
        const el = document.getElementById('last-online');
        if (!el) return;
        if (!when) { el.textContent = 'just a moment ago'; return; }
        const mins = Math.round((Date.now() - when) / 60000);
        if (mins < 1)   el.textContent = 'moments ago';
        else if (mins < 60) el.textContent = mins + ' minute' + (mins === 1 ? '' : 's') + ' ago';
        else {
          const hrs = Math.round(mins / 60);
          el.textContent = hrs + ' hour' + (hrs === 1 ? '' : 's') + ' ago';
        }
      } catch (_) { /* non-critical */ }
    })();

    // Poll for reconnection — reload the moment we're back online so the
    // user's click lands on a live page, not a stale copy.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
