<!DOCTYPE html>
<html lang="en" data-accent="mono">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Promoter Dashboard — ROSTR+ GCC</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://vgjmfpryobsuboukbemr.supabase.co" crossorigin>

  <link rel="stylesheet" href="assets/css/system.css?v=2521872">
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main id="main-content" class="container" style="padding-top: var(--space-xl); padding-bottom: var(--space-3xl)">
      <!-- ═══ Welcome ═══ -->
      <div class="dash-welcome lp-anim">
        <div>
          <div class="eyebrow" style="font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary)">
            <span id="welcome-date">—</span>
          </div>
          <h1>Good evening, <em id="welcome-name">there</em>.</h1>
          <p id="welcome-sub">Here's what's coming up.</p>
        </div>
        <div style="display: flex; gap: 8px">
          <a class="btn btn-secondary" href="directory.html">
            <span class="js-icon" data-icon="search" data-size="14"></span>
            Find artist
          </a>
          <a class="btn btn-primary" href="booking.html">
            <span class="js-icon" data-icon="plus" data-size="14"></span>
            New booking
          </a>
        </div>
      </div>

      <!-- ═══ Profile completion nudge ═══ -->
      <div id="completion-mount"></div>

      <!-- ═══ Big stats ═══ -->
      <div class="dash-stats">
        <div class="dash-stat lp-anim lp-d-1">
          <div class="label">Total bookings</div>
          <div class="value" id="stat-total">—</div>
          <div class="sub" id="stat-total-sub">—</div>
        </div>
        <div class="dash-stat lp-anim lp-d-2">
          <div class="label">Confirmed</div>
          <div class="value" style="color: var(--status-confirmed)" id="stat-confirmed">—</div>
          <div class="sub" id="stat-confirmed-sub">—</div>
        </div>
        <div class="dash-stat lp-anim lp-d-3">
          <div class="label">Pending</div>
          <div class="value" style="color: var(--status-pending)" id="stat-pending">—</div>
          <div class="sub" id="stat-pending-sub">—</div>
        </div>
        <div class="dash-stat lp-anim lp-d-4">
          <div class="label">Total spend</div>
          <div class="value" id="stat-spend">—</div>
          <div class="sub" id="stat-spend-sub">All time</div>
        </div>
      </div>

      <!-- ═══ Action required ═══ -->
      <div id="action-required-mount" style="margin-bottom: var(--space-xl)"></div>

      <!-- ═══ Body: timeline + side column ═══ -->
      <div class="dash-body">
        <!-- Timeline -->
        <div class="lp-anim lp-d-5">
          <div class="lp-section-head" style="align-items: end">
            <div>
              <span class="eyebrow">Upcoming</span>
              <h2 style="margin-top: 4px; font-family: var(--font-display); font-size: 1.5rem; letter-spacing: -0.03em">Next shows</h2>
            </div>
            <div class="dash-filter" role="tablist">
              <button data-filter="week" class="active">Week</button>
              <button data-filter="month">Month</button>
              <button data-filter="all">All</button>
            </div>
          </div>
          <div id="timeline-root"></div>
        </div>

        <!-- Side column -->
        <div class="dash-side lp-anim lp-d-5">
          <!-- Pipeline -->
          <div class="dash-card">
            <div class="head">
              <div>
                <span class="eyebrow">Pipeline</span>
                <h3>Booking funnel</h3>
              </div>
              <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-tertiary)" id="pipeline-total">—</span>
            </div>
            <div id="pipeline-root"></div>
          </div>

          <!-- Inbox -->
          <div class="dash-card">
            <div class="head">
              <div>
                <span class="eyebrow">Inbox</span>
                <h3>Recent messages</h3>
              </div>
              <a href="messages.html" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-soft)">Open &rarr;</a>
            </div>
            <div id="inbox-root" class="dash-inbox"></div>
          </div>

          <!-- Suggestion -->
          <div class="dash-suggest" id="suggestion-root" style="display: none">
            <span class="eyebrow" style="font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary)">Suggested for you</span>
            <div class="who">
              <div class="tile" id="sug-initials">—</div>
              <div style="flex: 1; min-width: 0">
                <div class="stage" id="sug-name">—</div>
                <div class="meta" id="sug-meta">—</div>
              </div>
            </div>
            <p id="sug-desc">—</p>
            <a id="sug-link" class="btn btn-secondary btn-sm" style="margin-top: 12px; width: 100%; justify-content: center">View profile</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Message modal (kept from the v2 dashboard for realtime toasts) -->
  <div id="message-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="message-modal-from">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="message-modal-from"></h3>
          <div class="text-secondary" style="font-size: 0.85rem; margin-top: 4px" id="message-modal-time"></div>
        </div>
        <button class="btn btn-ghost btn-icon" onclick="document.getElementById('message-modal').classList.remove('active')" aria-label="Close dialog">
          <span class="js-icon" data-icon="x" data-size="16" aria-hidden="true"></span>
        </button>
      </div>
      <div id="message-modal-preview" style="color: var(--text-secondary); line-height: 1.6; margin-bottom: var(--space-lg)"></div>
      <div style="display: flex; gap: var(--space-sm)">
        <a class="btn btn-primary flex-1" href="messages.html" style="text-align: center">View Full Message</a>
        <button class="btn btn-secondary flex-1" onclick="document.getElementById('message-modal').classList.remove('active')">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/error-logger.js?v=2521872" defer></script>
  <script src="assets/js/app.js?v=2521872" defer></script>
  <script>
    /* ═══ DASHBOARD — Promoter cockpit (v3 port) ═══ */
    let _allBookings = [];
    let _allMessages = [];
    let _currentFilter = 'week';

    function initials(name) {
      return (name || '?').split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    function avatarHueStyle(name) {
      const hash = (name || '').split('').reduce((h, c) => h + c.charCodeAt(0), 0);
      const hue = hash % 360;
      return `background: radial-gradient(ellipse at 30% 30%, hsla(${hue}, 22%, 45%, 0.55), transparent 70%), var(--bg-2);`;
    }

    /* ── Welcome text: greeting + date line ── */
    function renderWelcome() {
      const now = new Date();
      const h = now.getHours();
      const greeting = h < 6 ? 'Good night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
      const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      const city = Auth.user?.city || '';
      document.getElementById('welcome-date').textContent = dateStr + (city ? ' · ' + city : '');

      const firstName = (Auth.user?.display_name || Auth.user?.email?.split('@')[0] || 'there').split(/\s+/)[0];
      document.getElementById('welcome-name').textContent = firstName;

      const h1 = document.querySelector('.dash-welcome h1');
      if (h1) h1.firstChild.textContent = greeting + ', ';
    }

    /* ── Profile completion / onboarding nudge ──
       Two modes depending on how far along the user is:
         < 50% complete  → full onboarding checklist (first-session feel)
         50\u201399% complete → compact completion meter banner
         100%            → nothing
       Both dismissible for the rest of the day via localStorage. */
    async function renderCompletionBanner() {
      const host = document.getElementById('completion-mount');
      if (!host) return;
      if (UI.isCompletionDismissedToday && UI.isCompletionDismissedToday('dash')) return;
      const c = await DB.getProfileCompletion();
      if (!c || c.percent >= 100) { host.innerHTML = ''; return; }

      if (c.percent < 50) {
        // First-session onboarding checklist: promoter version
        const present = new Set((c.missing || []).map(m => m.key).reduce((a,b)=>a.concat([b]),[]));
        const isMissing = (k) => c.missing.some(m => m.key === k);
        const steps = [
          { key: 'display_name', label: 'Add your name', desc: 'How artists see you in messages and contracts', href: '/settings.html', done: !isMissing('display_name') },
          { key: 'avatar_url',   label: 'Upload a photo', desc: 'Builds trust \u2014 profiles with photos get 2\u00d7 responses', href: '/settings.html', done: !isMissing('avatar_url') },
          { key: 'company',      label: 'Add your company', desc: 'So venues and artists know who they\u2019re dealing with', href: '/settings.html', done: !isMissing('company') },
          { key: 'city',         label: 'Set your city', desc: 'We surface local artists first', href: '/settings.html', done: !isMissing('city') },
          { key: 'first_booking', label: 'Send your first booking', desc: 'Browse the directory and send a request', href: '/directory.html', done: (_allBookings && _allBookings.length > 0) },
        ];
        host.innerHTML = UI.onboardingChecklist(steps, { heading: 'Finish setting up your account', dismissId: 'dash' });
        return;
      }

      host.innerHTML = UI.completionMeter(c.percent, {
        variant: 'banner',
        missing: c.missing,
        heading: `Profile ${c.percent}% complete`,
        dismissId: 'dash',
      });
    }

    /* ── Action required ──
       Scans the user's current data for things that need a response:
         - Pending booking requests from artists (awaiting their accept)
         - Accepted bookings without a signed contract (promoter must send/chase)
         - Unpaid confirmed bookings (promoter must record payment)
         - Contracts sent to the artist that aren't signed yet
       Renders the top 5 with a clear CTA linking to the right surface.
       Hidden entirely when there's nothing to do. */
    async function renderActionItems() {
      const host = document.getElementById('action-required-mount');
      if (!host) return;

      const items = [];
      const now = Date.now();

      // Pending booking requests (promoter waiting on artist)
      const pending = (_allBookings || []).filter(b => ['pending','inquiry'].includes(b.status));
      for (const b of pending.slice(0, 3)) {
        const name = b.artists?.stage_name || b.artists?.profiles?.display_name || 'Artist';
        items.push({
          kind: 'pending',
          icon: 'clock',
          title: `Waiting on ${esc(name)}`,
          body: `${esc(b.event_name || b.venue_name || 'Event')} \u2014 ${b.event_date ? UI.formatDate(b.event_date) : ''}`,
          cta: 'View booking',
          href: `booking-detail.html?id=${b.id}`,
        });
      }

      // Confirmed bookings missing a contract (upcoming only)
      const confirmedNoContract = (_allBookings || []).filter(b =>
        b.status === 'confirmed' && !b.contracts?.length &&
        b.event_date && new Date(b.event_date).getTime() >= now - 86400000
      );
      for (const b of confirmedNoContract.slice(0, 2)) {
        const name = b.artists?.stage_name || b.artists?.profiles?.display_name || 'Artist';
        items.push({
          kind: 'contract',
          icon: 'fileText',
          title: `Send contract to ${esc(name)}`,
          body: `${esc(b.event_name || b.venue_name || 'Event')} is confirmed but has no contract yet`,
          cta: 'Create contract',
          href: `contracts.html`,
        });
      }

      // Fetch contracts + payments in parallel to find outstanding items
      const [contractsRes, paymentsRes] = await Promise.all([
        DB.getMyContracts ? DB.getMyContracts().catch(() => ({ data: [] })) : Promise.resolve({ data: [] }),
        DB.getMyPayments ? DB.getMyPayments().catch(() => ({ data: [] })) : Promise.resolve({ data: [] }),
      ]);

      // Contracts sent but not signed (promoter already sent, waiting on artist)
      const unsignedSent = (contractsRes.data || []).filter(c =>
        ['sent','pending','awaiting_signature'].includes(c.status)
      );
      for (const c of unsignedSent.slice(0, 2)) {
        const ev = c.bookings?.event_name || c.bookings?.venue_name || 'Event';
        items.push({
          kind: 'unsigned',
          icon: 'fileText',
          title: `Unsigned contract \u2014 ${esc(ev)}`,
          body: 'Artist hasn\u2019t signed yet. Nudge them via the booking thread.',
          cta: 'Open contract',
          href: `contract.html?id=${c.id}`,
        });
      }

      // Confirmed bookings without a recorded payment (past event_date takes priority)
      const paidBookingIds = new Set((paymentsRes.data || []).map(p => p.booking_id));
      const unpaid = (_allBookings || []).filter(b =>
        ['confirmed','contracted','completed'].includes(b.status) &&
        !paidBookingIds.has(b.id) &&
        b.event_date
      ).sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
      for (const b of unpaid.slice(0, 2)) {
        const name = b.artists?.stage_name || b.artists?.profiles?.display_name || 'Artist';
        const past = new Date(b.event_date).getTime() < now;
        items.push({
          kind: 'unpaid',
          icon: 'dollar',
          title: `${past ? 'Pay' : 'Payment due for'} ${esc(name)}`,
          body: `${esc(b.event_name || b.venue_name || 'Event')} \u2014 ${UI.formatDate(b.event_date)}${past ? ' \u2014 already played' : ''}`,
          cta: past ? 'Record payment' : 'View booking',
          href: `booking-detail.html?id=${b.id}`,
        });
      }

      if (items.length === 0) { host.innerHTML = ''; return; }

      // Cap at 5 — keeps the section tight and forces the user to clear
      // the top items before more surface.
      const top = items.slice(0, 5);
      host.innerHTML = `
        <div class="card" style="border:1px solid var(--accent-dim-20);box-shadow:var(--accent-glow)">
          <div class="card-inner">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:var(--space-md)">
              <div style="width:28px;height:28px;border-radius:8px;background:var(--accent-dim-10);display:flex;align-items:center;justify-content:center;color:var(--accent)">${UI.icon('activity', 14)}</div>
              <div style="flex:1">
                <div style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;font-family:var(--font-mono);color:var(--accent)">Action required</div>
                <div style="font-size:1rem;font-weight:600;color:var(--text-primary);margin-top:2px">${top.length} item${top.length === 1 ? '' : 's'} need your attention</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${top.map(it => `
                <a href="${it.href}" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);text-decoration:none;color:inherit;transition:border-color 120ms ease"
                   onmouseover="this.style.borderColor='var(--border-medium)'" onmouseout="this.style.borderColor='var(--border-subtle)'">
                  <div style="width:32px;height:32px;border-radius:8px;background:var(--bg-raised);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);flex-shrink:0">${UI.icon(it.icon, 16)}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:0.88rem;color:var(--text-primary);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.title}</div>
                    <div style="font-size:0.74rem;color:var(--text-tertiary);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.body}</div>
                  </div>
                  <div style="font-size:0.76rem;color:var(--accent);white-space:nowrap;flex-shrink:0;font-weight:500">${it.cta} \u2192</div>
                </a>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    /* ── Stats ── */
    function renderStats() {
      const total     = _allBookings.length;
      const confirmed = _allBookings.filter(b => ['confirmed','contracted','completed'].includes(b.status)).length;
      const pending   = _allBookings.filter(b => ['inquiry','pending'].includes(b.status)).length;
      const spend     = _allBookings.reduce((s, b) => s + (b.fee || b.amount || 0), 0);
      const spendK    = spend > 0 ? Math.round(spend / 1000) + 'K' : '0';

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-confirmed').textContent = confirmed;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-spend').textContent = 'AED ' + spendK;

      document.getElementById('stat-total-sub').textContent = total === 0 ? 'No bookings yet' : total + ' all-time';
      document.getElementById('stat-confirmed-sub').textContent = confirmed === 0 ? 'None confirmed' : confirmed + ' locked in';
      document.getElementById('stat-pending-sub').textContent = pending === 0 ? 'Nothing pending' : pending + ' need action';
      document.getElementById('stat-spend-sub').textContent = total > 0 ? 'Across ' + total + ' bookings' : 'All time';

      // Welcome subline based on counts
      const sub = pending > 0
        ? `${pending} booking${pending === 1 ? '' : 's'} need your attention.`
        : confirmed > 0
          ? `${confirmed} show${confirmed === 1 ? '' : 's'} locked in. Keep building the roster.`
          : 'Pick your first artist to get things moving.';
      document.getElementById('welcome-sub').textContent = sub;
    }

    /* ── Timeline (grouped by day) ── */
    function filterBookings(filter) {
      const now = new Date(); now.setHours(0,0,0,0);
      const weekOut  = new Date(now); weekOut.setDate(weekOut.getDate() + 7);
      const monthOut = new Date(now); monthOut.setMonth(monthOut.getMonth() + 1);

      return [..._allBookings]
        .filter(b => b.status !== 'cancelled')
        .filter(b => {
          const d = new Date(b.event_date || b.date);
          if (filter === 'week')  return d >= now && d <= weekOut;
          if (filter === 'month') return d >= now && d <= monthOut;
          return true;
        })
        .sort((a, b) => new Date(a.event_date || a.date) - new Date(b.event_date || b.date));
    }

    function groupByDate(list) {
      const groups = {};
      list.forEach(b => {
        const d = b.event_date || b.date;
        if (!d) return;
        groups[d] = groups[d] || [];
        groups[d].push(b);
      });
      return groups;
    }

    function renderTimeline() {
      const list = filterBookings(_currentFilter);
      const root = document.getElementById('timeline-root');
      if (list.length === 0) {
        root.innerHTML = `
          <div class="dir-empty" style="margin-top: 8px">
            <h3 style="margin-bottom: 8px">Nothing on the calendar</h3>
            <p style="color: var(--text-tertiary); font-size: 0.9rem; margin-bottom: 16px">
              No upcoming bookings in this range. Pick an artist to get started.
            </p>
            <a href="directory.html" class="btn btn-primary btn-sm">Browse roster</a>
          </div>
        `;
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const groups = groupByDate(list);

      root.innerHTML = Object.keys(groups).map((date, di) => {
        const dt = new Date(date + 'T00:00:00');
        const dd = dt.getDate();
        const mm = dt.toLocaleString('en', { month: 'short', weekday: 'short' });
        const isToday = date === today;
        return `
          <div class="timeline-day">
            <div class="timeline-date ${isToday ? 'today' : ''}">
              <div class="dd">${dd}</div>
              <div class="mm">${esc(mm)}</div>
            </div>
            <div class="timeline-events">
              ${groups[date].map(b => {
                const artistName = b.artist_name || b.artists?.stage_name || b.artists?.profiles?.display_name || '—';
                const venueName  = b.venue || b.venue_name || b.venues?.name || '—';
                const city       = b.city || b.venues?.city || '';
                const time       = b.event_time ? b.event_time.slice(0, 5) : (b.time || '—');
                const amount     = b.fee || b.amount || 0;
                const currency   = b.currency || 'AED';
                const feeK       = amount >= 1000 ? (amount / 1000).toFixed(amount % 1000 === 0 ? 0 : 1) + 'K' : String(amount);
                return `
                  <div class="event-row" onclick="viewBooking('${esc(b.id)}')">
                    <div class="time">${esc(time)}</div>
                    <div class="avatar" style="${avatarHueStyle(artistName)}">${esc(initials(artistName))}</div>
                    <div>
                      <div class="meta-name">${esc(artistName)}</div>
                      <div class="meta-venue">
                        <span>${esc(venueName)}</span>
                        ${city ? `<span style="width:2px;height:2px;border-radius:50%;background:var(--text-quaternary)"></span><span style="display:inline-flex;align-items:center;gap:4px">${UI.icon('mapPin', 10)} ${esc(city)}</span>` : ''}
                      </div>
                    </div>
                    ${UI.statusTag(b.status)}
                    <div class="fee"><small>${esc(currency)}</small>${esc(feeK)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      if (typeof hydrateIcons === 'function') hydrateIcons(root);
    }

    function viewBooking(id) {
      // booking-detail.html = single-booking view (status timeline, parties,
      // context-aware actions). bookings.html is the list + modal version.
      window.location.href = 'booking-detail.html?id=' + encodeURIComponent(id);
    }

    /* ── Pipeline ── */
    function renderPipeline() {
      const buckets = [
        { label: 'Inquiries',  keys: ['inquiry'],   color: 'var(--text-secondary)' },
        { label: 'Pending',    keys: ['pending'],   color: 'var(--status-pending)' },
        { label: 'Contracted', keys: ['contracted'],color: 'var(--status-info)'    },
        { label: 'Confirmed',  keys: ['confirmed'], color: 'var(--status-confirmed)' },
        { label: 'Completed',  keys: ['completed'], color: 'var(--accent)'         },
      ];
      const counts = buckets.map(b => ({ ...b, count: _allBookings.filter(x => b.keys.includes(x.status)).length }));
      const active = counts.reduce((s, b) => s + b.count, 0);
      const max    = Math.max(1, ...counts.map(b => b.count));

      document.getElementById('pipeline-total').textContent = active + ' active';
      document.getElementById('pipeline-root').innerHTML = counts.map(b => `
        <div class="dash-pipeline-row">
          <div class="label-line">
            <span style="color: var(--text-secondary)">${esc(b.label)}</span>
            <span class="count">${b.count}</span>
          </div>
          <div class="track">
            <div class="fill" style="width: ${Math.round((b.count / max) * 100)}%; background: ${b.color}"></div>
          </div>
        </div>
      `).join('');
    }

    /* ── Inbox ── */
    function renderInbox() {
      const seen = new Set();
      const convos = _allMessages.filter(msg => {
        const partnerId = msg.sender_id === Auth.user?.id ? msg.receiver_id : msg.sender_id;
        if (seen.has(partnerId)) return false;
        seen.add(partnerId);
        return true;
      }).slice(0, 3);

      const root = document.getElementById('inbox-root');
      if (convos.length === 0) {
        root.innerHTML = UI.emptyState({
          icon: 'inbox',
          title: 'No messages yet',
          body: 'Reach out to an artist to start a conversation.',
          cta: { label: 'Browse artists', href: '/directory.html' },
          compact: true,
        });
        return;
      }

      root.innerHTML = convos.map(msg => {
        const isMe = msg.sender_id === Auth.user?.id;
        const partner = isMe ? msg.receiver : msg.sender;
        const name = partner?.display_name || 'Unknown';
        const preview = msg.content || '';
        const time = UI.timeAgo(msg.created_at);
        const unread = !msg.read && !isMe;
        // If this message is tied to a booking, deep-link into that
        // thread; otherwise fall through to the flat inbox.
        const href = msg.booking_id
          ? `messages.html?booking=${encodeURIComponent(msg.booking_id)}`
          : 'messages.html';
        return `
          <div class="row" onclick="window.location.href='${href}'">
            ${UI.avatar(name, 32)}
            <div class="bubble">
              <div class="head-line">
                <span class="name">${esc(name)}${unread ? '<span class="unread-dot"></span>' : ''}</span>
                <span class="time">${esc(time)}</span>
              </div>
              <div class="preview">${esc(preview)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    /* ── Suggestion card ── */
    async function renderSuggestion() {
      // Only show if the promoter hasn't booked many artists yet
      if (_allBookings.length >= 3) return;

      const res = await DB.getArtists({});
      const artists = (res.success && res.data) ? res.data : [];
      if (artists.length === 0) return;

      // Pick the first verified active artist not yet booked by this promoter
      const booked = new Set(_allBookings.map(b => b.artist_id));
      const candidate = artists.find(a => a.verified && !booked.has(a.id)) || artists[0];
      if (!candidate) return;

      const root = document.getElementById('suggestion-root');
      document.getElementById('sug-initials').textContent = initials(candidate.name);
      document.getElementById('sug-initials').style.cssText += avatarHueStyle(candidate.name);
      document.getElementById('sug-name').textContent = candidate.name;
      document.getElementById('sug-meta').textContent =
        [candidate.genre, candidate.city].filter(Boolean).join(' · ') + ' · On request';
      document.getElementById('sug-desc').textContent =
        `${candidate.verified ? 'Verified' : 'Active'} on ROSTR+. ${candidate.city ? 'Based in ' + candidate.city + '.' : ''} Tap to view full profile.`;
      document.getElementById('sug-link').href = 'profile.html?id=' + encodeURIComponent(candidate.id);
      root.style.display = '';
    }

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', async function() {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { Auth.require(); return; }
      if (Auth.role === 'artist') { window.location.replace('artist-dashboard.html'); return; }

      // Onboarding check
      const onboarding = await DB.checkOnboarding();
      if (!onboarding.complete) {
        const hasName = Auth.user?.display_name && Auth.user.display_name !== Auth.user.email?.split('@')[0];
        if (!hasName) {
          UI.toast('Complete your profile to get started', 'info');
          setTimeout(() => window.location.href = 'settings.html?onboarding=1', 1500);
          return;
        } else {
          await DB.completeOnboarding();
        }
      }

      document.getElementById('nav-root').innerHTML = renderNav('dashboard');
      if (typeof hydrateIcons === 'function') hydrateIcons();
      renderWelcome();
      renderCompletionBanner().then(() => {
        // Welcome-email CTA lands with #setup hash — auto-scroll the
        // onboarding checklist into view once it's mounted.
        if (location.hash === '#setup') {
          const el = document.getElementById('completion-mount');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }).catch(() => {});

      // Load data
      const [bookingsRes, messagesRes] = await Promise.all([
        DB.getMyBookings(),
        DB.getConversations(),
      ]);
      _allBookings = bookingsRes.data || [];
      _allMessages = messagesRes.data || [];

      renderStats();
      renderActionItems().catch(() => {});
      renderTimeline();
      renderPipeline();
      renderInbox();
      renderSuggestion();

      // Filter pill listeners
      document.querySelectorAll('.dash-filter button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.dash-filter button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          _currentFilter = btn.dataset.filter;
          renderTimeline();
        });
      });

      // Realtime subscriptions
      Realtime.subscribeToBookings((updated) => {
        const idx = _allBookings.findIndex(b => b.id === updated.id);
        if (idx !== -1) _allBookings[idx] = { ..._allBookings[idx], ...updated };
        else _allBookings.unshift(updated);
        renderStats();
        renderActionItems().catch(() => {});
        renderTimeline();
        renderPipeline();
        UI.toast('Booking updated: ' + updated.status, 'info');
      });
      Realtime.subscribeToMessages(() => {
        UI.toast('New message received', 'info');
        renderInbox();
      });
    });

    // Close modal on outside click (kept for realtime toasts)
    document.getElementById('message-modal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>

    <site-footer id="site-footer"></site-footer>
</body>
