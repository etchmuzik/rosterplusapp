<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ROSTR+">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Promoter Dashboard — ROSTR+ GCC</title>
  <link rel="stylesheet" href="assets/css/system.css">
</head>
<body>
  <div class="page-shell">
    <nav-root id="nav-root"></nav-root>

    <main class="container" style="padding-top: var(--space-xl); padding-bottom: var(--space-2xl)">
      <!-- Welcome Header -->
      <div style="margin-bottom: var(--space-2xl); animation: fadeIn var(--duration-slow) var(--ease-out)">
        <h1 style="margin-bottom: var(--space-sm)">Welcome back, <span id="welcome-name">Demo Promoter</span></h1>
        <p class="text-secondary" id="welcome-subtitle">Your upcoming bookings and messages at a glance</p>
      </div>

      <!-- Stats Row -->
      <div class="stats-grid" style="margin-bottom: var(--space-2xl)">
        <div class="card stat-card animate-in stagger-1"><div class="card-inner"><div class="stat-label">Total Bookings</div><div class="stat-value">—</div></div></div>
        <div class="card stat-card animate-in stagger-2"><div class="card-inner"><div class="stat-label">Confirmed</div><div class="stat-value">—</div></div></div>
        <div class="card stat-card animate-in stagger-3"><div class="card-inner"><div class="stat-label">Pending</div><div class="stat-value">—</div></div></div>
        <div class="card stat-card animate-in stagger-4"><div class="card-inner"><div class="stat-label">Total Spend</div><div class="stat-value">—</div></div></div>
      </div>

      <!-- Upcoming Events Section -->
      <div style="margin-bottom: var(--space-2xl); animation: fadeIn var(--duration-slow) var(--ease-out); animation-delay: 200ms">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom: var(--space-lg)">
          <h2 style="margin: 0">Upcoming Events</h2>
          <a href="bookings.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div class="table-wrap">
          <table id="upcoming-events-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Artist</th>
                <th>Venue</th>
                <th>Status</th>
                <th style="text-align: right">Amount</th>
              </tr>
            </thead>
            <tbody id="upcoming-events-body">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Recent Messages Section -->
      <div style="margin-bottom: var(--space-2xl); animation: fadeIn var(--duration-slow) var(--ease-out); animation-delay: 300ms">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom: var(--space-lg)">
          <h2 style="margin: 0">Recent Messages</h2>
          <a href="messages.html" class="btn btn-ghost btn-sm">Open inbox</a>
        </div>
        <div id="recent-messages" style="display: flex; flex-direction: column; gap: var(--space-md)">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Quick Actions -->
      <div style="animation: fadeIn var(--duration-slow) var(--ease-out); animation-delay: 400ms">
        <h2 style="margin-bottom: var(--space-lg)">Quick Actions</h2>
        <div style="display: flex; gap: var(--space-md); flex-wrap: wrap">
          <button class="btn btn-primary" onclick="window.location.href='booking.html'">
            <span class="js-icon" data-icon="plus" data-size="16"></span>
            New Booking
          </button>
          <button class="btn btn-secondary" onclick="window.location.href='directory.html'">
            <span class="js-icon" data-icon="grid" data-size="16"></span>
            Browse Artists
          </button>
          <button class="btn btn-secondary" onclick="window.location.href='contracts.html'">
            <span class="js-icon" data-icon="fileText" data-size="16"></span>
            View Contracts
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Message Preview Card Modal -->
  <div id="message-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="message-modal-from"></h3>
          <div class="text-secondary" style="font-size: 0.85rem; margin-top: 4px" id="message-modal-time"></div>
        </div>
        <button class="btn btn-ghost btn-icon" onclick="document.getElementById('message-modal').classList.remove('active')">
          <span class="js-icon" data-icon="x" data-size="16"></span>
        </button>
      </div>
      <div id="message-modal-preview" style="color: var(--text-secondary); line-height: 1.6; margin-bottom: var(--space-lg)"></div>
      <div style="display: flex; gap: var(--space-sm)">
        <button class="btn btn-primary flex-1" onclick="window.location.href='messages.html'">
          View Full Message
        </button>
        <button class="btn btn-secondary flex-1" onclick="document.getElementById('message-modal').classList.remove('active')">
          Close
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════════════
       DASHBOARD — Promoter Overview (single-scroll)
       ═══════════════════════════════════════════════════════════ */

    let _allBookings = [];
    let _allMessages = [];

    document.addEventListener('DOMContentLoaded', async function() {
      await Auth.ready();
      if (!Auth.isLoggedIn()) { Auth.require(); return; }
      if (Auth.role === 'artist') { window.location.replace('artist-dashboard.html'); return; }

      // Onboarding check — redirect new promoters to settings to complete profile
      const onboarding = await DB.checkOnboarding();
      if (!onboarding.complete) {
        const hasName = Auth.user?.display_name && Auth.user.display_name !== Auth.user.email?.split('@')[0];
        if (!hasName) {
          UI.toast('Complete your profile to get started', 'info');
          setTimeout(() => window.location.href = 'settings.html?onboarding=1', 1500);
          return;
        } else {
          await DB.completeOnboarding();
        }
      }

      document.getElementById('nav-root').innerHTML = renderNav('dashboard');

      const userName = Auth.user?.display_name || Auth.user?.email?.split('@')[0] || 'Welcome';
      document.getElementById('welcome-name').textContent = userName;

      await loadDashboardData();

      // Subscribe to live booking updates
      Realtime.subscribeToBookings((updated) => {
        const idx = _allBookings.findIndex(b => b.id === updated.id);
        if (idx !== -1) _allBookings[idx] = { ..._allBookings[idx], ...updated };
        renderUpcomingEvents();
        UI.toast('Booking updated: ' + updated.status, 'info');
      });

      // Subscribe to new messages notification
      Realtime.subscribeToMessages(() => {
        UI.toast('New message received', 'info');
        renderRecentMessages();
      });
    });

    async function loadDashboardData() {
      const [bookingsRes, messagesRes] = await Promise.all([
        DB.getMyBookings(),
        DB.getConversations(),
      ]);
      _allBookings = bookingsRes.data || [];
      _allMessages = messagesRes.data || [];

      // Update stats
      const total = _allBookings.length;
      const confirmed = _allBookings.filter(b => b.status === 'confirmed' || b.status === 'contracted' || b.status === 'completed').length;
      const pending = _allBookings.filter(b => b.status === 'pending' || b.status === 'inquiry').length;
      const spend = _allBookings.reduce((sum, b) => sum + (b.fee || b.amount || 0), 0);

      const statCards = document.querySelectorAll('.stat-card .stat-value');
      if (statCards[0]) statCards[0].textContent = total;
      if (statCards[1]) statCards[1].textContent = confirmed;
      if (statCards[2]) statCards[2].textContent = pending;
      if (statCards[3]) statCards[3].textContent = spend > 0 ? Math.round(spend / 1000) + 'K' : '0';

      renderUpcomingEvents();
      renderRecentMessages();
    }

    // ── Render Upcoming Events (next 5) ──
    function renderUpcomingEvents() {
      const upcoming = [..._allBookings]
        .filter(b => b.status !== 'cancelled')
        .sort((a, b) => new Date(a.event_date || a.date) - new Date(b.event_date || b.date))
        .slice(0, 5);

      const tbody = document.getElementById('upcoming-events-body');
      if (!tbody) return;

      if (upcoming.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-tertiary);padding:24px">No upcoming events</td></tr>';
        return;
      }

      tbody.innerHTML = upcoming.map(b => {
        const artistName = b.artist_name || b.artists?.stage_name || '—';
        const venueName = b.venue || b.venues?.name || '—';
        const date = b.event_date || b.date;
        const amount = b.fee || b.amount || 0;
        const currency = b.currency || 'AED';
        return `
          <tr>
            <td><strong>${UI.formatDate(date)}</strong></td>
            <td>${esc(artistName)}</td>
            <td>${venueName}</td>
            <td>${UI.statusTag(b.status)}</td>
            <td style="text-align:right;font-family:var(--font-mono)"><strong>${UI.currency(amount, currency)}</strong></td>
          </tr>
        `;
      }).join('');
    }

    // ── Render Recent Messages ──
    function renderRecentMessages() {
      const container = document.getElementById('recent-messages');
      if (!container) return;

      // Deduplicate conversations by partner
      const seen = new Set();
      const convos = _allMessages.filter(msg => {
        const partnerId = msg.sender_id === (Auth.user?.id) ? msg.receiver_id : msg.sender_id;
        if (seen.has(partnerId)) return false;
        seen.add(partnerId);
        return true;
      }).slice(0, 3);

      if (convos.length === 0) {
        container.innerHTML = '<p class="text-tertiary" style="font-size:0.85rem">No messages yet</p>';
        return;
      }

      container.innerHTML = convos.map(msg => {
        const isMe = msg.sender_id === Auth.user?.id;
        const partner = isMe ? msg.receiver : msg.sender;
        const name = partner?.display_name || 'Unknown';
        const preview = msg.content || '';
        const time = UI.timeAgo(msg.created_at);
        const unread = !msg.read && !isMe;
        return `
          <div class="card card--interactive" onclick="window.location.href='messages.html'">
            <div class="card-inner" style="display:flex;align-items:center;gap:var(--space-md)">
              ${UI.avatar(name, 40)}
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:4px">
                  <strong style="font-size:0.95rem">${esc(name)}</strong>
                  ${unread ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0"></span>' : ''}
                </div>
                <p class="text-tertiary" style="font-size:0.85rem;margin:0;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(preview)}</p>
                <div class="text-tertiary" style="font-size:0.75rem;margin-top:4px">${time}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Close modal on outside click
    document.getElementById('message-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('active');
      }
    });
  </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
